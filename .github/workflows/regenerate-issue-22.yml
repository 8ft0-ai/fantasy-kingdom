name: Regenerate issue 22 runtime
on:
  push:
    branches: [issue-22-cultural-heraldry]
permissions:
  contents: write
jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-22-cultural-heraldry
      - name: Validate manifest and regenerate runtime
        run: python3 scripts/build.py
      - name: Commit generated runtime
        run: |
          if git diff --quiet -- annals.html; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add annals.html
          git commit -m "build: regenerate cultural heraldry runtime"
          git push
