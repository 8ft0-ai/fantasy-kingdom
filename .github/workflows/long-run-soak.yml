name: Long-run soak

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  long-run-soak:
    name: 200-year stability soak
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright
          npx playwright install chromium --with-deps

      - name: Start static server
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > soak-server.log 2>&1 &
          echo $! > soak-server.pid

      - name: Run long-run soak suite
        env:
          ANNALS_BASE_URL: http://127.0.0.1:4173
        run: node .github/scripts/soak-regression.mjs

      - name: Upload soak artefacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: annals-long-run-soak
          path: |
            soak-regression-report.json
            soak-server.log
          if-no-files-found: warn
