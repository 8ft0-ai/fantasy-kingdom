name: Browser smoke

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  annals-browser-smoke:
    name: ANNALS browser smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright
          npx playwright install chromium --with-deps

      - name: Start static server
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > browser-smoke-server.log 2>&1 &
          echo $! > browser-smoke-server.pid

      - name: Run browser smoke test
        env:
          ANNALS_BASE_URL: http://127.0.0.1:4173
        run: node .github/scripts/browser-smoke.mjs

      - name: Run runtime guard smoke test
        env:
          ANNALS_BASE_URL: http://127.0.0.1:4173
        run: node .github/scripts/runtime-guard-smoke.mjs

      - name: Run culture and heraldry smoke test
        env:
          ANNALS_BASE_URL: http://127.0.0.1:4173
        run: node .github/scripts/culture-smoke.mjs

      - name: Run acceptance harness smoke test
        env:
          ANNALS_BASE_URL: http://127.0.0.1:4173
        run: node .github/scripts/acceptance-smoke.mjs

      - name: Run notable family and life-arc smoke test
        env:
          ANNALS_BASE_URL: http://127.0.0.1:4173
        run: node .github/scripts/notable-life-smoke.mjs

      - name: Run 50-year economy smoke test
        env:
          ANNALS_BASE_URL: http://127.0.0.1:4173
        run: node .github/scripts/economy-smoke.mjs

      - name: Run disaster and Myth smoke test
        env:
          ANNALS_BASE_URL: http://127.0.0.1:4173
        run: node .github/scripts/disaster-smoke.mjs

      - name: Run war campaign smoke test
        env:
          ANNALS_BASE_URL: http://127.0.0.1:4173
        run: node .github/scripts/war-smoke.mjs

      - name: Run camera and Watch mode smoke test
        env:
          ANNALS_BASE_URL: http://127.0.0.1:4173
        run: node .github/scripts/camera-smoke.mjs

      - name: Run rendering and atmosphere smoke test
        env:
          ANNALS_BASE_URL: http://127.0.0.1:4173
        run: node .github/scripts/rendering-smoke.mjs

      - name: Run overlay smoke test
        env:
          ANNALS_BASE_URL: http://127.0.0.1:4173
        run: node .github/scripts/overlay-smoke.mjs

      - name: Run performance smoke test
        env:
          ANNALS_BASE_URL: http://127.0.0.1:4173
        run: node .github/scripts/performance-smoke.mjs

      - name: Upload browser smoke artefacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: annals-browser-smoke
          path: |
            screenshots/
            browser-smoke-report.json
            runtime-guard-smoke-report.json
            culture-smoke-report.json
            acceptance-smoke-report.json
            notable-life-smoke-report.json
            economy-smoke-report.json
            disaster-smoke-report.json
            war-smoke-report.json
            camera-smoke-report.json
            rendering-smoke-report.json
            overlay-smoke-report.json
            performance-smoke-report.json
            browser-smoke-server.log
          if-no-files-found: warn
