name: Bootstrap modular runtime source

on:
  push:
    branches:
      - issue-36-modular-runtime
    paths:
      - scripts/modularise_runtime.py
      - scripts/build.py
      - .github/workflows/bootstrap-modular-source.yml

permissions:
  contents: write

jobs:
  extract-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-36-modular-runtime
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Extract subsystem sources
        run: python3 scripts/modularise_runtime.py
      - name: Verify exact regeneration
        run: python3 scripts/build.py --check
      - name: Commit extracted sources
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src
          git diff --cached --quiet && exit 0
          git commit -m 'Extract modular runtime sources'
          git push
