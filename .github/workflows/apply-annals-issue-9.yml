name: Apply ANNALS issue 9
on:
  push:
    branches: [issue-9-settlement-layouts]
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-9-settlement-layouts
      - name: Rebuild ANNALS runtime
        run: |
          python3 - <<'PY'
          import base64, lzma
          from pathlib import Path
          data = ''''''
          Path('annals.html').write_bytes(lzma.decompress(base64.b64decode(data)))
          PY
          python3 - <<'PY'
          from pathlib import Path
          html = Path('annals.html').read_text()
          start = html.index("<script>\n'use strict';") + len("<script>\n")
          end = html.rindex('</script>')
          Path('/tmp/annals.js').write_text(html[start:end])
          PY
          node --check /tmp/annals.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add annals.html
          git commit -m "Expand settlement layouts and buildings"
          git push
