name: Diagnose issue 22 syntax
on:
  push:
    branches: [issue-22-cultural-heraldry]
permissions:
  contents: write
jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-22-cultural-heraldry
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Capture parser location
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          html = Path('annals.html').read_text(encoding='utf-8')
          scripts = [m.group('body') for m in re.finditer(r'<script(?:\s[^>]*)?>\n(?P<body>.*?)\n</script>', html, re.DOTALL) if 'src=' not in m.group(0)]
          if len(scripts) != 1:
              raise SystemExit(f'expected one inline script, found {len(scripts)}')
          Path('/tmp/annals-inline.js').write_text(scripts[0], encoding='utf-8')
          PY
          node --check /tmp/annals-inline.js > issue-22-syntax.txt 2>&1 || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add issue-22-syntax.txt
          git commit -m "ci: capture issue 22 parser location"
          git push
