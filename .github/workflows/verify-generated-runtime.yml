name: Verify generated runtime

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify generated artefact is current
        run: python3 scripts/build.py --check
      - name: Check generated JavaScript syntax
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          html = Path('annals.html').read_text(encoding='utf-8')
          scripts = [
              match.group('body')
              for match in re.finditer(
                  r'<script(?P<attrs>\s[^>]*)?>\n(?P<body>.*?)\n</script>',
                  html,
                  re.DOTALL,
              )
              if 'src=' not in (match.group('attrs') or '')
          ]
          if len(scripts) != 1:
              raise SystemExit(f'expected one inline script, found {len(scripts)}')
          Path('/tmp/annals-inline.js').write_text(scripts[0], encoding='utf-8')
          PY
          node --check /tmp/annals-inline.js
      - name: Verify Pages entrypoint preserves hashes
        run: grep -F "'annals.html' + (window.location.hash || '')" index.html
  cleanup-repository:
    name: One-shot repository cleanup
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[repository-cleanup]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      actions: write
    steps:
      - name: Delete closed-PR branches and stale workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: main
          ORIGINAL_WORKFLOW_B64:  
        shell: bash
        run: |
          set -euo pipefail

          API_ROOT="https://api.github.com"
          OWNER="${REPOSITORY%%/*}"
          DELETED_BRANCHES=()
          SKIPPED_BRANCHES=()
          PURGED_WORKFLOWS=()
          DELETED_RUNS=0

          api_get() {
            curl --fail-with-body --silent --show-error \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$1"
          }

          api_delete() {
            curl --silent --show-error \
              -o /tmp/api-delete-response.json \
              -w '%{http_code}' \
              -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$1"
          }

          url_encode() {
            jq -nr --arg value "$1" '$value | @uri'
          }

          echo "Inspecting repository branches..."
          page=1
          while :; do
            branches_json="$(api_get "${API_ROOT}/repos/${REPOSITORY}/branches?per_page=100&page=${page}")"
            branch_count="$(jq 'length' <<<"${branches_json}")"
            [[ "${branch_count}" -eq 0 ]] && break

            while IFS= read -r branch; do
              [[ "${branch}" == "${DEFAULT_BRANCH}" ]] && continue

              head_query="$(url_encode "${OWNER}:${branch}")"
              open_prs="$(api_get "${API_ROOT}/repos/${REPOSITORY}/pulls?state=open&head=${head_query}&per_page=100")"
              if [[ "$(jq 'length' <<<"${open_prs}")" -gt 0 ]]; then
                SKIPPED_BRANCHES+=("${branch} (open PR)")
                continue
              fi

              all_prs="$(api_get "${API_ROOT}/repos/${REPOSITORY}/pulls?state=all&head=${head_query}&per_page=100")"
              if [[ "$(jq 'length' <<<"${all_prs}")" -eq 0 ]]; then
                SKIPPED_BRANCHES+=("${branch} (no PR history)")
                continue
              fi

              delete_code="$(api_delete "${API_ROOT}/repos/${REPOSITORY}/git/refs/heads/${branch}")"
              if [[ "${delete_code}" == "204" ]]; then
                DELETED_BRANCHES+=("${branch}")
              else
                response="$(cat /tmp/api-delete-response.json 2>/dev/null || true)"
                SKIPPED_BRANCHES+=("${branch} (delete HTTP ${delete_code}: ${response})")
              fi
            done < <(jq -r '.[].name' <<<"${branches_json}")

            [[ "${branch_count}" -lt 100 ]] && break
            page=$((page + 1))
          done

          echo "Inspecting workflow definitions..."
          current_workflows="$(api_get "${API_ROOT}/repos/${REPOSITORY}/contents/.github/workflows?ref=${DEFAULT_BRANCH}")"
          mapfile -t CURRENT_PATHS < <(jq -r '.[] | select(.type == "file") | .path' <<<"${current_workflows}")

          page=1
          while :; do
            workflows_json="$(api_get "${API_ROOT}/repos/${REPOSITORY}/actions/workflows?per_page=100&page=${page}")"
            workflow_count="$(jq '.workflows | length' <<<"${workflows_json}")"
            [[ "${workflow_count}" -eq 0 ]] && break

            while IFS=$'\t' read -r workflow_id workflow_name workflow_path workflow_state; do
              keep=false
              for current_path in "${CURRENT_PATHS[@]}"; do
                if [[ "${workflow_path}" == "${current_path}" ]]; then
                  keep=true
                  break
                fi
              done
              [[ "${keep}" == "true" ]] && continue

              PURGED_WORKFLOWS+=("${workflow_name} [${workflow_path}; ${workflow_state}]")
              while :; do
                runs_json="$(api_get "${API_ROOT}/repos/${REPOSITORY}/actions/workflows/${workflow_id}/runs?per_page=100&page=1")"
                mapfile -t run_ids < <(jq -r '.workflow_runs[] | select(.status == "completed") | .id' <<<"${runs_json}")
                [[ "${#run_ids[@]}" -eq 0 ]] && break

                for run_id in "${run_ids[@]}"; do
                  delete_code="$(api_delete "${API_ROOT}/repos/${REPOSITORY}/actions/runs/${run_id}")"
                  if [[ "${delete_code}" == "204" ]]; then
                    DELETED_RUNS=$((DELETED_RUNS + 1))
                  else
                    echo "Could not delete workflow run ${run_id}: HTTP ${delete_code}" >&2
                  fi
                done
              done
            done < <(jq -r '.workflows[] | [.id, .name, .path, .state] | @tsv' <<<"${workflows_json}")

            [[ "${workflow_count}" -lt 100 ]] && break
            page=$((page + 1))
          done

          {
            echo "## Repository cleanup"
            echo
            echo "- Deleted closed-PR branches: ${#DELETED_BRANCHES[@]}"
            for branch in "${DELETED_BRANCHES[@]}"; do echo "  - \`${branch}\`"; done
            echo "- Preserved non-default branches: ${#SKIPPED_BRANCHES[@]}"
            for branch in "${SKIPPED_BRANCHES[@]}"; do echo "  - \`${branch}\`"; done
            echo "- Purged stale workflow definitions: ${#PURGED_WORKFLOWS[@]}"
            for workflow in "${PURGED_WORKFLOWS[@]}"; do echo "  - ${workflow}"; done
            echo "- Deleted stale workflow runs: ${DELETED_RUNS}"
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "Restoring the permanent workflow definition..."
          workflow_path=".github/workflows/verify-generated-runtime.yml"
          workflow_metadata="$(api_get "${API_ROOT}/repos/${REPOSITORY}/contents/${workflow_path}?ref=${DEFAULT_BRANCH}")"
          workflow_sha="$(jq -r '.sha' <<<"${workflow_metadata}")"
          restore_payload="$(jq -n \
            --arg message "chore: restore runtime verification workflow after repository cleanup" \
            --arg content "${ORIGINAL_WORKFLOW_B64}" \
            --arg sha "${workflow_sha}" \
            --arg branch "${DEFAULT_BRANCH}" \
            '{message: $message, content: $content, sha: $sha, branch: $branch}')"

          curl --fail-with-body --silent --show-error \
            -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            --data "${restore_payload}" \
            "${API_ROOT}/repos/${REPOSITORY}/contents/${workflow_path}" \
            >/dev/null
