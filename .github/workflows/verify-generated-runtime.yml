name: Verify generated runtime

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify generated artefact is current
        run: python3 scripts/build.py --check
      - name: Check generated JavaScript syntax
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          html = Path('annals.html').read_text(encoding='utf-8')
          scripts = [
              match.group('body')
              for match in re.finditer(
                  r'<script(?P<attrs>\s[^>]*)?>\n(?P<body>.*?)\n</script>',
                  html,
                  re.DOTALL,
              )
              if 'src=' not in (match.group('attrs') or '')
          ]
          if len(scripts) != 1:
              raise SystemExit(f'expected one inline script, found {len(scripts)}')
          Path('/tmp/annals-inline.js').write_text(scripts[0], encoding='utf-8')
          PY
          node --check /tmp/annals-inline.js
      - name: Verify Pages entrypoint preserves hashes
        run: grep -F "'annals.html' + (window.location.hash || '')" index.html
  cleanup-finalizer:
    name: Finalize repository cleanup
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[repository-cleanup-finalize]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      actions: write
    steps:
      - name: Verify cleanup and write report
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: main
          OLD_CLEANUP_SHA: 6e765e9148b00376078145b46b1544a7691c0e3c
        shell: bash
        run: |
          set -euo pipefail

          API_ROOT="https://api.github.com"
          OWNER="${REPOSITORY%%/*}"
          REPORT_PATH="cleanup-report.json"
          DELETED_BRANCHES=()
          PRESERVED_BRANCHES=()
          STALE_WORKFLOWS=()
          DELETED_RUNS=()
          RUN_DELETE_FAILURES=()

          request() {
            local method="$1"
            local url="$2"
            local data="${3:-}"
            if [[ -n "${data}" ]]; then
              curl --fail-with-body --silent --show-error \
                -X "${method}" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -H "Content-Type: application/json" \
                --data "${data}" \
                "${url}"
            else
              curl --fail-with-body --silent --show-error \
                -X "${method}" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "${url}"
            fi
          }

          status_request() {
            local method="$1"
            local url="$2"
            curl --silent --show-error \
              -o /tmp/status-response.json \
              -w '%{http_code}' \
              -X "${method}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${url}"
          }

          url_encode() {
            jq -nr --arg value "$1" '$value | @uri'
          }

          old_runs="$(request GET "${API_ROOT}/repos/${REPOSITORY}/actions/runs?head_sha=${OLD_CLEANUP_SHA}&per_page=100")"
          while IFS=$'\t' read -r run_id run_status; do
            [[ -z "${run_id}" ]] && continue
            if [[ "${run_status}" != "completed" ]]; then
              cancel_code="$(status_request POST "${API_ROOT}/repos/${REPOSITORY}/actions/runs/${run_id}/force-cancel")"
              echo "Force-cancel run ${run_id}: HTTP ${cancel_code}"
            fi
          done < <(jq -r '.workflow_runs[] | [.id, .status] | @tsv' <<<"${old_runs}")

          for attempt in 1 2 3 4 5 6; do
            sleep 5
            old_runs="$(request GET "${API_ROOT}/repos/${REPOSITORY}/actions/runs?head_sha=${OLD_CLEANUP_SHA}&per_page=100")"
            active_count="$(jq '[.workflow_runs[] | select(.status != "completed")] | length' <<<"${old_runs}")"
            [[ "${active_count}" -eq 0 ]] && break
          done

          old_runs="$(request GET "${API_ROOT}/repos/${REPOSITORY}/actions/runs?head_sha=${OLD_CLEANUP_SHA}&per_page=100")"
          while IFS= read -r run_id; do
            [[ -z "${run_id}" ]] && continue
            delete_code="$(status_request DELETE "${API_ROOT}/repos/${REPOSITORY}/actions/runs/${run_id}")"
            if [[ "${delete_code}" == "204" ]]; then
              DELETED_RUNS+=("${run_id}")
            else
              RUN_DELETE_FAILURES+=("${run_id}:HTTP-${delete_code}")
            fi
          done < <(jq -r '.workflow_runs[] | select(.status == "completed") | .id' <<<"${old_runs}")

          branches="$(request GET "${API_ROOT}/repos/${REPOSITORY}/branches?per_page=100")"
          while IFS= read -r branch; do
            [[ "${branch}" == "${DEFAULT_BRANCH}" ]] && continue
            head_query="$(url_encode "${OWNER}:${branch}")"
            open_prs="$(request GET "${API_ROOT}/repos/${REPOSITORY}/pulls?state=open&head=${head_query}&per_page=100")"
            all_prs="$(request GET "${API_ROOT}/repos/${REPOSITORY}/pulls?state=all&head=${head_query}&per_page=100")"

            if [[ "$(jq 'length' <<<"${open_prs}")" -eq 0 && "$(jq 'length' <<<"${all_prs}")" -gt 0 ]]; then
              delete_code="$(status_request DELETE "${API_ROOT}/repos/${REPOSITORY}/git/refs/heads/${branch}")"
              if [[ "${delete_code}" == "204" ]]; then
                DELETED_BRANCHES+=("${branch}")
              else
                PRESERVED_BRANCHES+=("${branch}:delete-HTTP-${delete_code}")
              fi
            elif [[ "$(jq 'length' <<<"${open_prs}")" -gt 0 ]]; then
              PRESERVED_BRANCHES+=("${branch}:open-PR")
            else
              PRESERVED_BRANCHES+=("${branch}:no-PR-history")
            fi
          done < <(jq -r '.[].name' <<<"${branches}")

          current_workflows="$(request GET "${API_ROOT}/repos/${REPOSITORY}/contents/.github/workflows?ref=${DEFAULT_BRANCH}")"
          mapfile -t CURRENT_PATHS < <(jq -r '.[] | select(.type == "file") | .path' <<<"${current_workflows}")
          workflows="$(request GET "${API_ROOT}/repos/${REPOSITORY}/actions/workflows?per_page=100")"

          while IFS=$'\t' read -r workflow_id workflow_name workflow_path workflow_state; do
            [[ -z "${workflow_id}" ]] && continue
            keep=false
            for current_path in "${CURRENT_PATHS[@]}"; do
              if [[ "${workflow_path}" == "${current_path}" ]]; then
                keep=true
                break
              fi
            done
            [[ "${keep}" == "true" ]] && continue

            STALE_WORKFLOWS+=("${workflow_name}|${workflow_path}|${workflow_state}")
            runs="$(request GET "${API_ROOT}/repos/${REPOSITORY}/actions/workflows/${workflow_id}/runs?per_page=100")"
            while IFS= read -r run_id; do
              [[ -z "${run_id}" ]] && continue
              delete_code="$(status_request DELETE "${API_ROOT}/repos/${REPOSITORY}/actions/runs/${run_id}")"
              if [[ "${delete_code}" == "204" ]]; then
                DELETED_RUNS+=("${run_id}")
              else
                RUN_DELETE_FAILURES+=("${run_id}:HTTP-${delete_code}")
              fi
            done < <(jq -r '.workflow_runs[] | select(.status == "completed") | .id' <<<"${runs}")
          done < <(jq -r '.workflows[] | [.id, .name, .path, .state] | @tsv' <<<"${workflows}")

          final_branches="$(request GET "${API_ROOT}/repos/${REPOSITORY}/branches?per_page=100")"
          final_workflows="$(request GET "${API_ROOT}/repos/${REPOSITORY}/actions/workflows?per_page=100")"

          deleted_branches_json="$(printf '%s\n' "${DELETED_BRANCHES[@]:-}" | jq -Rsc 'split("\n") | map(select(length > 0))')"
          preserved_branches_json="$(printf '%s\n' "${PRESERVED_BRANCHES[@]:-}" | jq -Rsc 'split("\n") | map(select(length > 0))')"
          stale_workflows_json="$(printf '%s\n' "${STALE_WORKFLOWS[@]:-}" | jq -Rsc 'split("\n") | map(select(length > 0))')"
          deleted_runs_json="$(printf '%s\n' "${DELETED_RUNS[@]:-}" | jq -Rsc 'split("\n") | map(select(length > 0))')"
          run_failures_json="$(printf '%s\n' "${RUN_DELETE_FAILURES[@]:-}" | jq -Rsc 'split("\n") | map(select(length > 0))')"

          report="$(jq -n \
            --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson deleted_branches "${deleted_branches_json}" \
            --argjson preserved_branches "${preserved_branches_json}" \
            --argjson stale_workflows "${stale_workflows_json}" \
            --argjson deleted_runs "${deleted_runs_json}" \
            --argjson run_delete_failures "${run_failures_json}" \
            --argjson final_branches "$(jq '[.[].name]' <<<"${final_branches}")" \
            --argjson current_workflows "$(jq '[.workflows[] | {name, path, state}]' <<<"${final_workflows}")" \
            '{
              generated_at: $generated_at,
              deleted_branches_in_final_pass: $deleted_branches,
              preserved_non_default_branches: $preserved_branches,
              stale_workflows_seen: $stale_workflows,
              deleted_workflow_runs: $deleted_runs,
              workflow_run_delete_failures: $run_delete_failures,
              final_branches: $final_branches,
              workflows_after_cleanup: $current_workflows
            }')"

          report_b64="$(printf '%s\n' "${report}" | base64 -w0)"
          payload="$(jq -n \
            --arg message "chore: record repository cleanup result" \
            --arg content "${report_b64}" \
            --arg branch "${DEFAULT_BRANCH}" \
            '{message: $message, content: $content, branch: $branch}')"

          request PUT "${API_ROOT}/repos/${REPOSITORY}/contents/${REPORT_PATH}" "${payload}" >/dev/null
