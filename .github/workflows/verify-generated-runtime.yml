name: Verify generated runtime

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify generated artefact is current
        run: python3 scripts/build.py --check
      - name: Check generated JavaScript syntax
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          html = Path('annals.html').read_text(encoding='utf-8')
          scripts = [
              match.group('body')
              for match in re.finditer(
                  r'<script(?P<attrs>\s[^>]*)?>\n(?P<body>.*?)\n</script>',
                  html,
                  re.DOTALL,
              )
              if 'src=' not in (match.group('attrs') or '')
          ]
          if len(scripts) != 1:
              raise SystemExit(f'expected one inline script, found {len(scripts)}')
          Path('/tmp/annals-inline.js').write_text(scripts[0], encoding='utf-8')
          PY
          node --check /tmp/annals-inline.js
      - name: Verify Pages entrypoint preserves hashes
        run: grep -F "'annals.html' + (window.location.hash || '')" index.html
  orphan-branch-cleanup:
    name: Delete orphan delivery branches
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[repository-orphan-branch-cleanup]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete allowlisted orphan branches and update report
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: main
        shell: bash
        run: |
          set -euo pipefail

          API_ROOT="https://api.github.com"
          REPORT_PATH="cleanup-report.json"
          BRANCHES=(
            "add-index-for-pages"
            "enable-github-pages-root"
            "enable-pages-index-file"
            "enable-pages-root"
            "enable-pages-root-index"
            "fix-pages-entrypoint"
            "gh-pages-entrypoint"
            "github-pages-index"
            "issue-7-v06-coherence-legibility"
            "issue-12-complete-economy"
            "issue-36-modular-source"
            "pages-enable-root-index"
            "pages-entry-final"
            "pages-entry-index"
            "pages-gh-pages-root-entry"
            "pages-index"
            "pages-index-entry"
            "pages-index-file"
            "pages-index-html"
            "pages-index-html-entry"
            "pages-index-redirect"
            "pages-root"
            "pages-root-fix"
            "pages-root-index"
            "root-index"
            "root-index-page"
          )
          DELETED=()
          FAILURES=()

          status_request() {
            local method="$1"
            local url="$2"
            curl --silent --show-error \
              -o /tmp/status-response.json \
              -w '%{http_code}' \
              -X "${method}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${url}"
          }

          api_get() {
            curl --fail-with-body --silent --show-error \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$1"
          }

          for branch in "${BRANCHES[@]}"; do
            code="$(status_request DELETE "${API_ROOT}/repos/${REPOSITORY}/git/refs/heads/${branch}")"
            if [[ "${code}" == "204" || "${code}" == "404" ]]; then
              DELETED+=("${branch}")
            else
              body="$(cat /tmp/status-response.json 2>/dev/null || true)"
              FAILURES+=("${branch}:HTTP-${code}:${body}")
            fi
          done

          final_branches="$(api_get "${API_ROOT}/repos/${REPOSITORY}/branches?per_page=100")"
          final_workflows="$(api_get "${API_ROOT}/repos/${REPOSITORY}/actions/workflows?per_page=100")"
          report_metadata="$(api_get "${API_ROOT}/repos/${REPOSITORY}/contents/${REPORT_PATH}?ref=${DEFAULT_BRANCH}")"
          report_sha="$(jq -r '.sha' <<<"${report_metadata}")"

          deleted_json="$(printf '%s\n' "${DELETED[@]:-}" | jq -Rsc 'split("\n") | map(select(length > 0))')"
          failures_json="$(printf '%s\n' "${FAILURES[@]:-}" | jq -Rsc 'split("\n") | map(select(length > 0))')"

          report="$(jq -n \
            --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson deleted_orphan_branches "${deleted_json}" \
            --argjson deletion_failures "${failures_json}" \
            --argjson final_branches "$(jq '[.[].name]' <<<"${final_branches}")" \
            --argjson current_workflows "$(jq '[.workflows[] | {name, path, state}]' <<<"${final_workflows}")" \
            '{
              generated_at: $generated_at,
              deleted_orphan_branches: $deleted_orphan_branches,
              deletion_failures: $deletion_failures,
              final_branches: $final_branches,
              workflows_after_cleanup: $current_workflows
            }')"

          report_b64="$(printf '%s\n' "${report}" | base64 -w0)"
          payload="$(jq -n \
            --arg message "chore: record final repository cleanup result" \
            --arg content "${report_b64}" \
            --arg sha "${report_sha}" \
            --arg branch "${DEFAULT_BRANCH}" \
            '{message: $message, content: $content, sha: $sha, branch: $branch}')"

          curl --fail-with-body --silent --show-error \
            -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            --data "${payload}" \
            "${API_ROOT}/repos/${REPOSITORY}/contents/${REPORT_PATH}" \
            >/dev/null
