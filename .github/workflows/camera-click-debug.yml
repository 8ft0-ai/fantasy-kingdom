name: Camera click diagnostic

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          npm install --no-save playwright
          npx playwright install chromium --with-deps
      - run: |
          python3 -m http.server 4173 --bind 127.0.0.1 >/tmp/camera-click-server.log 2>&1 &
          node .github/scripts/camera-click-debug.mjs
