name: Regenerate issue 11 runtime

on:
  push:
    branches: [issue-11-complete-notable-life-arcs]

permissions:
  contents: write

jobs:
  regenerate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-11-complete-notable-life-arcs
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/build.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add annals.html
          git diff --cached --quiet && exit 0
          git commit -m "build: regenerate paced notable life runtime"
          git push