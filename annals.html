<script>
'use strict';
const W=6000,HALF=W/2,TAU=Math.PI*2;
const sylA=['Vael','Oster','Ald','Bran','Mere','Eld','Thorn','Wych','Har','Fen','Cor','Luth','Ash','Raven','Briar','Grey','Stone','Low'];
const sylB=['mere','ford','holt','caster','wyck','fall','haven','bridge','field','wick','barrow','gate','watch','water'];
const beasts=['Stag','Wolf','Oak','Comet','Tower','Wave','Key','Sun','Boar','Raven','Lily','Fox'];
const male=['Aldric','Oswin','Cedric','Garran','Leof','Warin','Baldor','Edrin','Theomund','Harlan','Godric','Merek'];
const female=['Maelis','Ysella','Elowen','Britha','Aveline','Rowena','Mira','Seren','Alys','Edith','Caelia','Isolde'];
function xmur3(str){let h=1779033703^String(str).length;for(let i=0;i<String(str).length;i++){h=Math.imul(h^String(str).charCodeAt(i),3432918353);h=h<<13|h>>>19}return function(){h=Math.imul(h^h>>>16,2246822507);h=Math.imul(h^h>>>13,3266489909);return(h^h>>>16)>>>0}}
function sfc32(a,b,c,d){return function(){a>>>=0;b>>>=0;c>>>=0;d>>>=0;let t=(a+b)|0;a=b^b>>>9;b=(c+(c<<3))|0;c=(c<<21|c>>>11);d=(d+1)|0;t=(t+d)|0;c=(c+t)|0;return(t>>>0)/4294967296}}
function rngFrom(seed,tag){const f=xmur3(seed+':'+tag);return sfc32(f(),f(),f(),f())}
const clamp=(v,a,b)=>Math.max(a,Math.min(b,Number.isFinite(v)?v:a));
const lerp=(a,b,t)=>a+(b-a)*t;
const rnd=(r,a,b)=>a+r()*(b-a);
const irnd=(r,a,b)=>Math.floor(rnd(r,a,b+1));
const choice=(r,a)=>a[Math.floor(r()*a.length)];
const dist=(a,b)=>Math.hypot(a.x-b.x,a.z-b.z);
function valueNoise(seed,x,y){let xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;function n(a,b){let s=Math.sin((a*127.1+b*311.7+seed)*437.58)*43758.5453;return s-Math.floor(s)}let u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);return lerp(lerp(n(xi,yi),n(xi+1,yi),u),lerp(n(xi,yi+1),n(xi+1,yi+1),u),v)}
function fbm(seed,x,y){let v=0,a=.5,f=1;for(let o=0;o<5;o++){v+=a*valueNoise(seed,x*f,y*f);f*=2;a*=.5}return v}
function namePlace(r){return choice(r,sylA)+choice(r,sylB)}
function person(r,sex){return choice(r,sex==='f'?female:male)+' '+choice(r,['of','at','de'])+' '+namePlace(r)}
let genR,hisR,world,scene,camera,renderer,raycaster,mouse,settlementGroup,roadGroup,markerGroup,terrain,labels=[],selectables=[],markers=[];
const clock={day:1,speed:8,acc:0};
const director={queue:[],until:0,suspend:0,target:null};
const keys={};
function hWorld(x,z){let nx=x/W*2,nz=z/W*2;let ridge=Math.exp(-Math.pow(nx*.75-nz*.45-.08,2)*5)*250;let h=(fbm(11,nx*2.1+2,nz*2.1-1)-.45)*160+ridge;return clamp(h,-12,620)}
function seasonForDay(day){return ['Spring','Summer','Autumn','Winter'][Math.floor(((day-1)%360)/90)]}
function dateText(day){let y=Math.floor((day-1)/360)+1,d=(day-1)%360+1,seas=['Spring','Summer','Autumn','Winter'];return `Year ${y}, ${seas[Math.floor((d-1)/90)]} ${((d-1)%90)+1}`}
function makeWorld(seed){genR=rngFrom(seed,'generation');hisR=rngFrom(seed,'history');let title=namePlace(genR);let houses=[],settlements=[],rivers=[],roads=[],notables=[];for(let i=0;i<9;i++){let ang=i/9*TAU+rnd(genR,-.22,.22),rad=i===0?0:rnd(genR,900,2550);let x=Math.cos(ang)*rad,z=Math.sin(ang)*rad,y=hWorld(x,z);let type=i===0?'capital':i<4?'town':'village';let pop=type==='capital'?irnd(genR,2100,3000):type==='town'?irnd(genR,650,1300):irnd(genR,160,420);let fertility=clamp(.78+fbm(44,x/900,z/900)*.75+(Math.abs(y)<80?.2:0),.55,1.45);let s={id:i,name:namePlace(genR),type,x,z,y,pop,basePop:pop,fertility,prosperity:irnd(genR,48,78),hunger:irnd(genR,4,16),unrest:irnd(genR,8,24),loyalty:irnd(genR,50,86),owner:Math.min(i,5),garrison:Math.floor(pop*.06),stores:{grain:Math.floor(pop*rnd(genR,.2,.34)),fish:Math.floor(pop*rnd(genR,.035,.09)),timber:irnd(genR,80,260),tools:irnd(genR,20,120)},prices:{grain:1,fish:1,timber:1,tools:1},buildings:[],crisis:{shortageDays:0,lastShortageEntry:-999,lastRiot:-999,lastRevolt:-999,lastHungerEntry:-999,lastRelief:-999},lastFood:safeNum(pop*.25)};let count=type==='capital'?90:type==='town'?44:18;for(let b=0;b<count;b++){let br=Math.sqrt(genR())*(type==='capital'?430:type==='town'?260:140),ba=genR()*TAU;let bx=x+Math.cos(ba)*br,bz=z+Math.sin(ba)*br;settlementBuild(s,bx,bz,choice(genR,['house','house','granary','market','shrine','workshop']))}settlements.push(s)}
for(let i=0;i<6;i++){let seat=settlements[Math.min(i,settlements.length-1)];let h={id:i,name:'House '+(i===0?choice(genR,beasts):choice(genR,beasts)+' '+choice(genR,sylB)),seatSettlement:seat.id,colour:['#8b1e2d','#235d86','#3d7b47','#8b6b23','#6f3c87','#7b3f22'][i],loyalty:i===0?100:seat.loyalty,might:Math.floor(seat.pop*.18),wealth:irnd(genR,250,900),rebellious:false,pressureReason:''};houses.push(h)}
for(const h of houses){let sex=hisR()<.5?'f':'m';let head={id:notables.length,name:person(hisR,sex),sex,house:h.id,role:h.id===0?'Monarch':'Lord',age:irnd(hisR,24,64),alive:true,epithet:''};notables.push(head);h.head=head.id;}
for(let i=0;i<settlements.length;i++)settlements[i].owner=Math.min(i,5);
for(let i=1;i<settlements.length;i++){roads.push(roadBetween(settlements[0],settlements[i]));if(i<settlements.length-1&&i%2===1)roads.push(roadBetween(settlements[i],settlements[i+1]))}
for(let k=0;k<90;k++){let t=k/89,x=lerp(-2600,2600,t)+Math.sin(t*TAU*2.3)*240,z=lerp(2400,-2100,t)+Math.sin(t*TAU)*180;rivers.push({x,z,w:18+k*.22})}
world={version:'v0.6',seed,title,settlements,houses,notables,roads,rivers,events:[],filter:'all',season:'Spring',weather:'Clear',pop:0,treasury:3500,legitimacy:72,rates:{harvest:1,birth:1,mortality:1,trade:1,tax:.12,disaster:1,aggression:1},drought:{active:false,until:0,severity:0,source:'',noted:false,started:0},story:{beats:0,lastHarvest:0,lastFestival:-99,lastIncident:0,lastPressureReview:0,firstDroughtDay:112+irnd(hisR,0,28),chainSeen:false,riotCount:0,revoltCount:0,tradeValue:0},markers:[],fatal:null};
return world}
function safeNum(v){return Number.isFinite(v)?v:0}
function settlementBuild(s,x,z,kind){s.buildings.push({settlement:s.id,kind,x,z,y:hWorld(x,z),state:'sound',burnedAt:-999,rot:rnd(genR,0,TAU),tier:kind==='granary'?2:kind==='market'?1:0})}
function roadBetween(a,b){let pts=[],steps=Math.max(4,Math.ceil(dist(a,b)/150));for(let k=0;k<=steps;k++){let t=k/steps,wig=Math.sin(t*Math.PI)*Math.sin(t*7+a.id*19+b.id*31)*80;let dx=b.x-a.x,dz=b.z-a.z,len=Math.hypot(dx,dz)||1;let x=lerp(a.x,b.x,t)+(-dz/len)*wig,z=lerp(a.z,b.z,t)+(dx/len)*wig;pts.push({x,z,y:hWorld(x,z)+3})}return{a:a.id,b:b.id,pts,traffic:0}}
function monarch(){return world.notables.find(n=>n.alive&&n.role==='Monarch')||world.notables[0]}
function houseHead(h){return world.notables[h.head]||world.notables.find(n=>n.house===h.id)}
function foodTotal(s){return safeNum(s.stores.grain)+safeNum(s.stores.fish)*.8}
function pressureName(s){let h=Math.floor(s.hunger),u=Math.floor(s.unrest),p=Math.floor(s.prosperity);return `${s.name} · H${h} U${u} P${p}`}
function record(cls,priority,target,text){if(!world)return null;let pos={x:0,y:0,z:0};if(target&&typeof target.x==='number')pos={x:target.x,y:target.y||hWorld(target.x,target.z),z:target.z};let ev={day:Math.floor(clock.day),class:cls,priority,pos,text};world.events.unshift(ev);world.events.length=Math.min(world.events.length,260);world.story.beats++;director.queue.push(ev);director.queue.length=Math.min(director.queue.length,80);if(typeof document!=='undefined')renderChronicle();return ev}
function tick(){if(!world)return;clock.day++;let old=world.season;world.season=seasonForDay(clock.day);if(world.season!==old)record('fate',4,world.settlements[0],`${world.season} came upon ${world.title}, and the stewards watched the granaries for what the weather would write next.`);weather();plannedPressure();economy();population();politics();threats();storyPulse();clampWorldState();if(clock.day%12===0&&typeof document!=='undefined'){refreshLabels();updateControls();updateHUD()}}
function weather(){let roll=hisR(),season=world.season;world.weather=season==='Winter'&&roll<.2?'Snow':roll<.09?'Rain':roll<.12?'Storm':roll<.24?'Overcast':'Clear'}
function droughtFactor(){if(!world.drought.active||clock.day>world.drought.until)return 1;return clamp(1-world.drought.severity,.25,1)}
function startDrought(reason='the rains failed'){world.drought={active:true,until:clock.day+90,severity:.62,source:reason,noted:false,started:clock.day};let s=driestSettlement();record('fate',9,s,`A hard drought settled over ${world.title}: ${reason}. Wells sank and the next harvest would be measured against empty bins.`);addMarker(s,0xd09b39,'drought',48);}
function endDrought(){if(world.drought.active&&clock.day>world.drought.until){world.drought.active=false;world.drought.severity=0;let s=mostHungrySettlement();record('trade',6,s,`Clouds returned after the drought, but ${s.name} had learned how quickly hunger could become politics.`)}}
function plannedPressure(){if(clock.day===world.story.firstDroughtDay&&!world.drought.active)startDrought('a dry wind came early in summer');endDrought()}
function driestSettlement(){return world.settlements.slice().sort((a,b)=>a.fertility-b.fertility||b.hunger-a.hunger)[0]}
function mostHungrySettlement(){return world.settlements.slice().sort((a,b)=>b.hunger-a.hunger||b.unrest-a.unrest)[0]}
function economy(){world.pop=0;let drought=droughtFactor();for(const s of world.settlements){let before=foodTotal(s),seasonMult=world.season==='Summer'?1.18:world.season==='Winter'?.58:1,weatherMult=world.weather==='Storm'?.84:world.weather==='Rain'?1.08:1;let grainProd=s.pop*.020*s.fertility*seasonMult*weatherMult*world.rates.harvest*drought;let fishProd=s.pop*.0038*(nearRiver(s.x,s.z)?1.45:.55)*(world.weather==='Storm'?.55:1);let grainUse=s.pop*.018,fishUse=s.pop*.004;let reserveUse=Math.max(0,grainUse-grainProd);s.stores.grain=clamp(s.stores.grain+grainProd-grainUse,0,s.pop*1.2+1200);s.stores.fish=clamp(s.stores.fish+fishProd-fishUse,0,s.pop*.35+500);s.stores.timber=clamp(s.stores.timber+s.pop*.0015-s.pop*.0007,0,5000);s.stores.tools=clamp(s.stores.tools+s.pop*.00035-s.pop*.00025,0,1500);let after=foodTotal(s),foodNeed=s.pop*.11,shortage=clamp((foodNeed-after)/Math.max(1,foodNeed),0,1);s.prices.grain=clamp(foodNeed/(s.stores.grain+20),.45,5);s.prices.fish=clamp(foodNeed*.25/(s.stores.fish+15),.45,5);s.prices.timber=clamp(s.pop*.015/(s.stores.timber+30),.4,4);s.prices.tools=clamp(s.pop*.006/(s.stores.tools+15),.4,4);if(world.drought.active&&!world.drought.noted&&clock.day-world.drought.started>18&&after<before*.82){world.drought.noted=true;record('trade',8,s,`Because drought cut the harvest around ${s.name}, food stores fell from ${Math.floor(before)} to ${Math.floor(after)} within a season; the market raised grain prices and poor households began to borrow bread.`)}if(shortage>0){s.crisis.shortageDays++;s.hunger=clamp(s.hunger+shortage*3.2+.08,0,100);s.unrest=clamp(s.unrest+shortage*2.3+.04,0,100);s.prosperity=clamp(s.prosperity-shortage*.75,0,100);let h=world.houses[s.owner];if(h&&h.id!==0)h.loyalty=clamp(h.loyalty-shortage*.23*world.rates.aggression,0,100);if(s.crisis.shortageDays>10&&clock.day-s.crisis.lastShortageEntry>45){s.crisis.lastShortageEntry=clock.day;record('trade',8,s,`Food shortage in ${s.name} drew down the stores and raised hunger to ${Math.floor(s.hunger)}; unrest followed, because full tax rolls could not answer empty bowls.`)}}else{s.crisis.shortageDays=Math.max(0,s.crisis.shortageDays-2);s.hunger=clamp(s.hunger-.42,0,100);s.unrest=clamp(s.unrest-.16,0,100);s.prosperity=clamp(s.prosperity+.08,0,100);if(s.hunger<18&&clock.day-s.crisis.lastRelief>160){s.crisis.lastRelief=clock.day;record('trade',4,s,`Relief carts steadied ${s.name}; hunger eased, and the market returned to quieter bargaining.`)}}tryRiotOrRevolt(s);world.treasury=clamp(world.treasury+s.pop*world.rates.tax*.004,0,50000);world.pop+=Math.floor(s.pop)}}
function nearRiver(x,z){return world.rivers.some(r=>Math.hypot(r.x-x,r.z-z)<220)}
function population(){for(const s of world.settlements){let shortage=clamp((s.hunger-35)/65,0,1);let birth=.00052*world.rates.birth*(s.prosperity/60)*(1-shortage*.7);let death=.00028*world.rates.mortality*(1+shortage*5+s.unrest/180);let old=s.pop;s.pop=clamp(s.pop*(1+birth-death),30,9000);if(shortage>.45&&clock.day-s.crisis.lastHungerEntry>90&&old-s.pop>1){s.crisis.lastHungerEntry=clock.day;record('fate',7,s,`Hunger thinned ${s.name}; mortality rose while fields and families both gave less than the ledgers expected.`)}}}

function updateMarkers(t){if(!markerGroup)return;for(let i=markers.length-1;i>=0;i--){let mk=markers[i],age=clock.day-mk.born;mk.mesh.position.y+=Math.sin(t*.004+mk.phase)*.05;mk.mesh.rotation.y+=.024;mk.mesh.material.opacity=clamp(.78-age/mk.life,.05,.78);let sc=1+Math.sin(t*.006+mk.phase)*.1;mk.mesh.scale.set(sc,sc,sc);if(age>mk.life){markerGroup.remove(mk.mesh);markers.splice(i,1)}}}
function updateSeasonLook(){if(!scene)return;let col=world.season==='Winter'?0xb8c8d9:world.season==='Autumn'?0xc69b6a:world.season==='Summer'?0xb9c981:0x9fb5c6;scene.fog.color.setHex(col);refreshSettlementMeshes()}
function animate(t){requestAnimationFrame(animate);let dt=Math.min(.05,(t-(animate.last||t))/1000);animate.last=t;clock.acc+=dt*clock.speed;while(clock.acc>=1){tick();clock.acc-=1}cameraControls(dt);directorUpdate();labelsUpdate();updateMarkers(t);updateSeasonLook();updateHUD();if(renderer&&scene&&camera)renderer.render(scene,camera)}
function runHeadless(seed,days,opts={}){clock.day=1;clock.speed=8;clock.acc=0;director.queue=[];director.until=0;director.suspend=0;world=makeWorld(seed);if(opts.forceDrought)startDrought('test drought');let initial=world.settlements.map(s=>foodTotal(s));for(let i=0;i<days;i++)tick();return{seed,day:clock.day,events:world.events.map(e=>e.text),riots:world.story.riotCount,revolts:world.story.revoltCount,chainSeen:world.story.chainSeen,initialFood:initial,food:world.settlements.map(s=>foodTotal(s)),settlements:world.settlements.map(s=>({name:s.name,pop:s.pop,hunger:s.hunger,unrest:s.unrest,prosperity:s.prosperity,stores:s.stores,shortageDays:s.crisis.shortageDays})),houses:world.houses.map(h=>({name:h.name,loyalty:h.loyalty,rebellious:h.rebellious}))}}
function boot(){let forge=document.getElementById('forge');try{let seed=(location.hash.match(/s=([^&]+)/)||[])[1]||String(Math.floor(Math.random()*1e9));location.hash='s='+encodeURIComponent(seed);world=makeWorld(seed);document.title='The Annals of '+world.title;document.getElementById('title').textContent='The Annals of '+world.title;setupScene();raycaster=new THREE.Raycaster();mouse=new THREE.Vector2();record('crown',9,world.settlements[0],`Here begin the years of ${monarch().name}, ruler of ${world.title}.`);record('trade',6,world.settlements[0],`The king's roads were measured, and the first market ledgers bound food, prosperity and loyalty together.`);record('crown',6,world.settlements[0],`${world.houses.length} great houses swore fealty, each with a bright sigil and a private memory.`);record('fate',7,driestSettlement(),`The dry fields of ${driestSettlement().name} were watched closely, for in ${world.title} weather could become history.`);addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space')clock.speed=clock.speed?0:8;if(['Digit1','Digit2','Digit3','Digit4'].includes(e.code))clock.speed=[.5,2,8,30][+e.code.slice(-1)-1];if(e.code==='KeyH')document.body.classList.toggle('clean');if(e.code==='KeyC')document.body.classList.toggle('watch');if(e.code==='Escape')document.getElementById('inspector').style.display='none'});addEventListener('keyup',e=>keys[e.code]=false);renderer.domElement.addEventListener('click',pick);renderer.domElement.addEventListener('wheel',e=>{camera.position.y=clamp(camera.position.y*(1+Math.sign(e.deltaY)*.12),60,4200);director.suspend=clock.day+30},{passive:true});let dragging=false,last={x:0,y:0};renderer.domElement.addEventListener('pointerdown',e=>{dragging=true;last={x:e.clientX,y:e.clientY};director.suspend=clock.day+30});addEventListener('pointerup',()=>dragging=false);addEventListener('pointermove',e=>{if(!dragging)return;let dx=e.clientX-last.x,dy=e.clientY-last.y;last={x:e.clientX,y:e.clientY};let tgt=camera.userData.target;tgt.x-=dx*camera.position.y/900;tgt.z-=dy*camera.position.y/900});document.querySelectorAll('#timeBtns button').forEach(b=>b.onclick=()=>clock.speed=+b.dataset.spd);document.querySelectorAll('.filters button').forEach(b=>b.onclick=()=>{world.filter=b.dataset.filter;document.querySelectorAll('.filters button').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderChronicle()});forge.style.opacity=0;setTimeout(()=>forge.classList.add('hidden'),500);animate(performance.now())}catch(err){console.error(err);if(forge){forge.textContent='The realm failed to form: '+err.message;forge.style.fontFamily='Inter, system-ui, sans-serif';forge.style.fontSize='18px';forge.style.padding='24px';forge.style.textAlign='center'}}}
if(typeof window!=='undefined'){window.ANNALS_DEBUG={makeWorld:seed=>makeWorld(seed),runHeadless};window.addEventListener('load',boot)}
</script>
