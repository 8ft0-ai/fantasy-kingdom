<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
const W=6000,N=96,HALF=W/2,TAU=Math.PI*2;
function xmur3(str){let h=1779033703^str.length;for(let i=0;i<str.length;i++){h=Math.imul(h^str.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return function(){h=Math.imul(h^h>>>16,2246822507);h=Math.imul(h^h>>>13,3266489909);return (h^h>>>16)>>>0}}
function sfc32(a,b,c,d){return function(){a>>>=0;b>>>=0;c>>>=0;d>>>=0;let t=(a+b)|0;a=b^b>>>9;b=(c+(c<<3))|0;c=(c<<21|c>>>11);d=(d+1)|0;t=(t+d)|0;c=(c+t)|0;return (t>>>0)/4294967296}}
function rngFrom(seed,tag){const f=xmur3(seed+':'+tag);return sfc32(f(),f(),f(),f())} const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)), lerp=(a,b,t)=>a+(b-a)*t, dist=(a,b)=>Math.hypot(a.x-b.x,a.z-b.z), choice=(r,a)=>a[Math.floor(r()*a.length)], rnd=(r,a,b)=>a+r()*(b-a), irnd=(r,a,b)=>Math.floor(rnd(r,a,b+1));
const sylA=['Vael','Oster','Ald','Bran','Mere','Eld','Thorn','Wych','Har','Fen','Cor','Luth','Ash','Raven','Briar','Grey'], sylB=['mere','ford','holt','caster','wyck','fall','haven','bridge','field','wick','barrow','gate'];
const male=['Aldric','Oswin','Cedric','Garran','Leof','Warin','Baldor','Edrin','Theomund','Harlan']; const female=['Maelis','Ysella','Elowen','Britha','Aveline','Rowena','Mira','Seren','Alys','Edith']; const beasts=['Stag','Wolf','Oak','Comet','Tower','Wave','Key','Sun','Boar','Raven','Lily','Fox']; const traits=['bold','craven','just','cruel','shrewd','dull','pious','cynical','fertile','sickly','proud','patient','wrathful','kind','avaricious','melancholic'];
function namePlace(r){return choice(r,sylA)+choice(r,sylB)} function person(r,sex){return choice(r,sex==='f'?female:male)+' '+choice(r,['of','de','at'])+' '+namePlace(r)}
let genR,hisR,scene,camera,renderer,raycaster,mouse,world,clock={day:1,speed:2,acc:0},selectables=[],labels=[],director={target:null,until:0,queue:[],suspend:0},keys={},manual=false;
function heightAt(ix,iz){ix=clamp(Math.round(ix),0,N);iz=clamp(Math.round(iz),0,N);return world.heights[iz*(N+1)+ix]}
function worldToGrid(x,z){return {i:(x+HALF)/W*N,j:(z+HALF)/W*N}}
function hWorld(x,z){const g=worldToGrid(x,z),i=Math.floor(g.i),j=Math.floor(g.j),tx=g.i-i,tz=g.j-j; const h00=heightAt(i,j),h10=heightAt(i+1,j),h01=heightAt(i,j+1),h11=heightAt(i+1,j+1); return lerp(lerp(h00,h10,tx),lerp(h01,h11,tx),tz)}
function noise(r,x,y){return Math.sin(x*12.9898+y*78.233+r()*0.0001)*43758.5453%1}
function valueNoise(seed,x,y){let xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;function n(a,b){let s=Math.sin((a*127.1+b*311.7+seed)*437.58)*43758.5453;return s-Math.floor(s)}let u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);return lerp(lerp(n(xi,yi),n(xi+1,yi),u),lerp(n(xi,yi+1),n(xi+1,yi+1),u),v)}
function fbm(seed,x,y){let v=0,a=.5,f=1;for(let o=0;o<5;o++){v+=a*valueNoise(seed,x*f,y*f);f*=2;a*=.5}return v}
function makeWorld(seed){genR=rngFrom(seed,'generation');hisR=rngFrom(seed,'history');let title=namePlace(genR);world={seed,title,heights:[],biomes:[],rivers:[],settlements:[],roads:[],houses:[],notables:[],caravans:[],armies:[],events:[],treasury:3500,legitimacy:72,weather:'Clear',season:'Spring',pop:0,filter:'all',rates:{harvest:1,birth:1,trade:1,tax:.12,disaster:1,aggression:1,myth:1}}; document.title='The Annals of '+title; document.getElementById('title').textContent='The Annals of '+title; terrain(seed); hydrology(); settlements(); roads(); houses(); buildCast();}
function terrain(seed){const coast=genR()<.4?choice(genR,['N','S','E','W']):null, spine=genR()*TAU; for(let j=0;j<=N;j++)for(let i=0;i<=N;i++){let x=i/N*2-1,z=j/N*2-1;let warp=fbm(22,x*2+3,z*2-1)-.5;let nx=x+warp*.25,nz=z+warp*.25;let base=fbm(7,nx*2.3,nz*2.3);let ridge=Math.exp(-Math.pow(nx*Math.cos(spine)+nz*Math.sin(spine)-.15,2)*9);let h=(base-.38)*180+ridge*520; if(coast){let edge=coast==='N'?(1-z):coast==='S'?(z+1):coast==='E'?(1-x):(x+1);h-=Math.max(0,.34-edge)*900;} h=clamp(h,-22,720); world.heights.push(h); let moist=fbm(42,x*2-1,z*2+4); let b=h<4?'water':h>480?'rock':h>300?'pine':moist>.66?'forest':moist<.25?'meadow':h<80?'farm':'meadow'; world.biomes.push(b);}}
function hydrology(){let start={x:rnd(genR,-1800,1800),z:rnd(genR,-1800,1800)}; let p=start; for(let k=0;k<70;k++){let best=p,bh=hWorld(p.x,p.z);for(let a=0;a<10;a++){let q={x:p.x+Math.cos(a/10*TAU)*120,z:p.z+Math.sin(a/10*TAU)*120};let hh=hWorld(q.x,q.z)-k*.3;if(hh<bh){bh=hh;best=q}} world.rivers.push(best); p=best; if(Math.abs(p.x)>HALF-80||Math.abs(p.z)>HALF-80||hWorld(p.x,p.z)<2)break;} if(world.rivers.length<20){for(let k=world.rivers.length;k<45;k++)world.rivers.push({x:p.x+k*20,z:p.z+k*10})}}
function nearRiver(p){let m=1e9;for(const r of world.rivers)m=Math.min(m,dist(p,r));return m}
function settlements(){let candidates=[];for(let j=4;j<N-4;j+=3)for(let i=4;i<N-4;i+=3){let x=i/N*W-HALF,z=j/N*W-HALF,h=heightAt(i,j);if(h<8||h>260)continue;let water=nearRiver({x,z}),flat=1-Math.abs(heightAt(i+1,j)-heightAt(i-1,j))/80,score=flat*55+Math.max(0,240-water)/4+(world.biomes[j*(N+1)+i]==='farm'?40:0)+genR()*35; candidates.push({x,z,score})} candidates.sort((a,b)=>b.score-a.score); let need=1+irnd(genR,2,3)+irnd(genR,3,5),types=['capital'];for(let i=1;i<need;i++)types.push(i<4?'town':'village'); for(const type of types){let c=candidates.find(c=>world.settlements.every(s=>dist(c,s)>700)); if(!c)continue; let pop=type==='capital'?irnd(genR,2100,3200):type==='town'?irnd(genR,500,1200):irnd(genR,90,320); let s={id:world.settlements.length,name:namePlace(genR),type,x:c.x,z:c.z,y:hWorld(c.x,c.z),pop,prosperity:irnd(genR,45,75),unrest:irnd(genR,5,22),stores:{grain:pop*.45,fish:pop*.1,timber:100,ore:30,tools:20,cloth:20,wine:10},walls:type==='capital'?80:type==='town'?25:0,buildings:[],infected:{S:pop,I:0,R:0},owner:null}; createBuildings(s); world.settlements.push(s); world.pop+=pop; }}
function createBuildings(s){let count=s.type==='capital'?320:s.type==='town'?130:42,rad=s.type==='capital'?430:s.type==='town'?260:130; const types=['house','house','house','shop','smithy','granary','tavern','temple','warehouse']; for(let k=0;k<count;k++){let a=genR()*TAU,rr=Math.pow(genR(),.72)*rad;let x=s.x+Math.cos(a)*rr,z=s.z+Math.sin(a)*rr;let tier=s.type==='capital'?irnd(genR,1,3):s.type==='town'?irnd(genR,0,2):irnd(genR,0,1);let arch=k===0?(s.type==='capital'?'keep':'market'):choice(genR,types);s.buildings.push({settlement:s.id,archetype:arch,tier,x,z,y:hWorld(x,z),rot:genR()*TAU,state:'sound',emissive:genR()<.25});}}
function roads(){if(world.settlements.length<2)return; let cap=world.settlements[0]; for(let i=1;i<world.settlements.length;i++){let a=cap,b=world.settlements[i],pts=[];let steps=Math.ceil(dist(a,b)/100);for(let k=0;k<=steps;k++){let t=k/steps;let x=lerp(a.x,b.x,t)+Math.sin(t*Math.PI)*rnd(genR,-140,140);let z=lerp(a.z,b.z,t)+Math.sin(t*Math.PI)*rnd(genR,-140,140);pts.push({x,z,y:hWorld(x,z)+2});} world.roads.push({a:a.id,b:b.id,pts});}}
function houses(){const colours=['#7d1f1f','#234f7a','#2e6b3d','#6c4a82','#9a6a22','#356267']; for(let i=0;i<5;i++){let seat=world.settlements[i%world.settlements.length];let h={id:i,name:'House '+(genR()<.55?seat.name:choice(genR,beasts)),seatSettlement:seat.id,loyalty:irnd(genR,42,82),might:irnd(genR,30,70),wealth:irnd(genR,200,900),colour:colours[i],charge:choice(genR,beasts),grudges:{}};world.houses.push(h); if(i<world.settlements.length)world.settlements[i].owner=i;} for(const s of world.settlements) if(s.owner==null)s.owner=irnd(genR,1,4);}
function buildCast(){let crown=world.houses[0]; for(let i=0;i<120;i++){let sex=hisR()<.5?'f':'m',house=choice(hisR,world.houses);let role=i===0?'Monarch':i===1?'Consort':i<10?'Heir':i<25?'Lord':'Notable';let n={id:i,name:i===0?person(hisR,'f'):person(hisR,sex),sex,house:house.id,age:i===0?irnd(hisR,28,58):irnd(hisR,1,78),traits:[choice(hisR,traits),choice(hisR,traits)],role,alive:true,epithet:''};world.notables.push(n);} chronicle('crown',9,world.settlements[0],`Here begin the years of ${monarch().name}, first set beneath the banners of ${world.title}.`);}
function monarch(){return world.notables.find(n=>n.alive&&n.role==='Monarch')||world.notables.find(n=>n.alive)}
function renderWorld(){scene=new THREE.Scene();scene.fog=new THREE.Fog(0x9fb5c6,1500,7000);camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,12000);camera.position.set(0,1800,2600);renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;document.getElementById('app').appendChild(renderer.domElement);scene.add(new THREE.HemisphereLight(0xd9ecff,0x4b3423,1.05));const sun=new THREE.DirectionalLight(0xfff1c2,1.8);sun.position.set(-1200,2200,900);sun.castShadow=true;scene.add(sun);
 const sky=new THREE.Mesh(new THREE.SphereGeometry(8000,32,16),new THREE.MeshBasicMaterial({color:0x8fb2d8,side:THREE.BackSide}));scene.add(sky); terrainMesh(); waterMesh(); roadMeshes(); buildingMeshes(); treeMeshes(); agentsMeshes(); makeLabels(); updateControls(); updateHUD();}
function terrainMesh(){const g=new THREE.PlaneBufferGeometry(W,W,N,N);g.rotateX(-Math.PI/2);const pos=g.attributes.position,cols=[];for(let i=0;i<pos.count;i++){let x=pos.getX(i),z=pos.getZ(i),h=hWorld(x,z);pos.setY(i,h);let b=world.biomes[i]||'meadow',c=new THREE.Color(b==='water'?0x345f79:b==='farm'?0x8aa35a:b==='forest'?0x3e6f43:b==='pine'?0x315641:b==='rock'?0x8e8780:0x73a85b);let shade=.84+(h/720)*.28;c.multiplyScalar(shade);cols.push(c.r,c.g,c.b)}g.setAttribute('color',new THREE.Float32BufferAttribute(cols,3));g.computeVertexNormals();let m=new THREE.MeshLambertMaterial({vertexColors:true});let mesh=new THREE.Mesh(g,m);mesh.receiveShadow=true;scene.add(mesh)}
function waterMesh(){const pts=world.rivers.map(p=>new THREE.Vector3(p.x,hWorld(p.x,p.z)+4,p.z));const mat=new THREE.LineBasicMaterial({color:0x427d9c,transparent:true,opacity:.9});for(let w=0;w<3;w++){let line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts.map(p=>p.clone().add(new THREE.Vector3(w*3,0,w*2)))),mat);scene.add(line)} const water=new THREE.Mesh(new THREE.PlaneBufferGeometry(W,W,1,1),new THREE.MeshLambertMaterial({color:0x315f7a,transparent:true,opacity:.55}));water.rotation.x=-Math.PI/2;water.position.y=0;scene.add(water)}
function roadMeshes(){const mat=new THREE.LineBasicMaterial({color:0x7b6040,linewidth:2});for(const r of world.roads){let line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(r.pts.map(p=>new THREE.Vector3(p.x,p.y+2,p.z))),mat);scene.add(line)}}
function buildingMeshes(){let dummy=new THREE.Object3D(), box=new THREE.BoxBufferGeometry(1,1,1), mat=new THREE.MeshLambertMaterial({color:0xc9b38c});let arr=[];world.settlements.forEach(s=>arr.push(...s.buildings));let mesh=new THREE.InstancedMesh(box,mat,arr.length);mesh.userData.kind='buildings';mesh.castShadow=true;mesh.receiveShadow=true;arr.forEach((b,i)=>{let sx=b.archetype==='keep'?70:rnd(genR,16,34), sz=b.archetype==='keep'?80:rnd(genR,18,38), sy=b.archetype==='keep'?95:(18+b.tier*13+rnd(genR,0,16));dummy.position.set(b.x,b.y+sy/2,b.z);dummy.rotation.y=b.rot;dummy.scale.set(sx,sy,sz);dummy.updateMatrix();mesh.setMatrixAt(i,dummy.matrix);let col=new THREE.Color(b.state==='ruin'?0x38332e:b.tier>=2?0xb6a489:b.tier===1?0xaa7752:0x8d6b49);mesh.setColorAt(i,col);b.instance=i;b.obj=mesh;selectables.push({kind:'building',data:b,pos:new THREE.Vector3(b.x,b.y,b.z)})});scene.add(mesh); for(const s of world.settlements){selectables.push({kind:'settlement',data:s,pos:new THREE.Vector3(s.x,s.y,s.z)})}}
function treeMeshes(){let dummy=new THREE.Object3D(), cone=new THREE.ConeBufferGeometry(8,38,6), mat=new THREE.MeshLambertMaterial({color:0x315b34});let pts=[];for(let k=0;k<1500;k++){let x=rnd(genR,-HALF,HALF),z=rnd(genR,-HALF,HALF),g=worldToGrid(x,z),b=world.biomes[Math.round(g.j)*(N+1)+Math.round(g.i)];if((b==='forest'||b==='pine')&&world.settlements.every(s=>dist({x,z},s)>220))pts.push({x,z})}let mesh=new THREE.InstancedMesh(cone,mat,pts.length);mesh.userData.kind='trees';pts.forEach((p,i)=>{let y=hWorld(p.x,p.z);dummy.position.set(p.x,y+18,p.z);let sc=rnd(genR,.8,1.7);dummy.scale.set(sc,sc,sc);dummy.updateMatrix();mesh.setMatrixAt(i,dummy.matrix)});scene.add(mesh)}
let agentGroup;function agentsMeshes(){agentGroup=new THREE.Group();scene.add(agentGroup);spawnCaravans(10)}
function spawnCaravans(n){for(let i=0;i<n;i++){let a=choice(hisR,world.settlements),b=choice(hisR,world.settlements);if(a===b)continue;let road=world.roads.find(r=>(r.a===a.id&&r.b===b.id)||(r.a===b.id&&r.b===a.id));if(!road)continue;let car={id:world.caravans.length,origin:a.id,dest:b.id,cargo:choice(hisR,['grain','timber','cloth','tools','wine']),value:irnd(hisR,25,160),path:road.a===a.id?road.pts:road.pts.slice().reverse(),departT:clock.day-rnd(hisR,0,40),arriveT:clock.day+rnd(hisR,40,130),mesh:null};world.caravans.push(car);let m=new THREE.Mesh(new THREE.BoxBufferGeometry(24,18,36),new THREE.MeshLambertMaterial({color:0x7b4d2a}));m.castShadow=true;agentGroup.add(m);car.mesh=m;selectables.push({kind:'caravan',data:car,pos:m.position});}}
function makeLabels(){labels.forEach(l=>l.el.remove());labels=[];for(const s of world.settlements){let el=document.createElement('div');el.className='label '+(s.type==='capital'?'capital':'');el.textContent=s.name;document.body.appendChild(el);labels.push({el,s})}}
function updateAgents(){for(const c of world.caravans){let t=((clock.day-c.departT)/(c.arriveT-c.departT)); if(t>=1){let o=world.settlements[c.origin],d=world.settlements[c.dest];chronicle('trade',5,d,`A caravan from ${o.name} came into ${d.name} with ${c.cargo}, and the market bells were rung.`);c.origin=c.dest;c.dest=choice(hisR,world.settlements).id;let road=world.roads.find(r=>(r.a===c.origin&&r.b===c.dest)||(r.b===c.origin&&r.a===c.dest)); if(!road){c.dest=0;road=world.roads.find(r=>r.a===c.origin||r.b===c.origin)} c.path=road?(road.a===c.origin?road.pts:road.pts.slice().reverse()):c.path;c.departT=clock.day;c.arriveT=clock.day+rnd(hisR,50,120);t=0;} t=clamp(t,0,1);let idx=Math.min(c.path.length-2,Math.floor(t*(c.path.length-1))),lt=t*(c.path.length-1)-idx,p=c.path[idx],q=c.path[idx+1]||p;let x=lerp(p.x,q.x,lt),z=lerp(p.z,q.z,lt),y=hWorld(x,z)+18;c.mesh.position.set(x,y,z);c.mesh.rotation.y=Math.atan2(q.x-p.x,q.z-p.z);c.pos=c.mesh.position;}}
function chronicle(cls,priority,target,text){let ev={day:Math.floor(clock.day),class:cls,priority,pos:target?new THREE.Vector3(target.x||0,target.y||hWorld(target.x||0,target.z||0),target.z||0):new THREE.Vector3(),text};world.events.unshift(ev);director.queue.push(ev);renderChronicle();}
function dateText(day){let y=Math.floor((day-1)/360)+1,d=(day-1)%360+1,seas=['Spring','Summer','Autumn','Winter'];return `Year ${y}, ${seas[Math.floor((d-1)/90)]} ${((d-1)%90)+1}`}
function tick(){clock.day++;let d=(clock.day-1)%360;world.season=['Spring','Summer','Autumn','Winter'][Math.floor(d/90)]; if(d===0)chronicle('crown',4,world.settlements[0],`The year turned, and the clerks sharpened their quills for the reign of ${monarch().name}.`); economy(); politics(); fates(); growth();}
function economy(){world.pop=0;for(const s of world.settlements){let harvest=(world.season==='Summer'?1.6:world.season==='Winter'?.35:.9)*world.rates.harvest;let need=s.pop*.018;s.stores.grain+=harvest*(s.type==='village'?8:s.type==='town'?18:42)-need;if(s.stores.grain<0){s.unrest=clamp(s.unrest+2,0,100);s.pop=Math.max(30,s.pop*(.997-.002*world.rates.birth)); if(hisR()<.018)chronicle('fate',6,s,`Hunger walked the lanes of ${s.name}, and the granaries gave only dust.`)}else{s.unrest=clamp(s.unrest-.18,0,100);s.prosperity=clamp(s.prosperity+.05,0,100);s.pop*=1+.0007*world.rates.birth;}world.treasury+=s.pop*world.rates.tax*.006;world.pop+=Math.floor(s.pop);} }
function politics(){for(const h of world.houses){h.loyalty=clamp(h.loyalty+(world.rates.tax>.18?-.035:.01)*world.rates.aggression,0,100); if(h.loyalty<25&&hisR()<.01*world.rates.aggression){let s=world.settlements[h.seatSettlement];chronicle('war',10,s,`${h.name} raised its banner against the crown at ${s.name}, and riders carried the treason by moonlight.`);spawnArmy(h,s);h.loyalty+=25;}}
 for(const n of world.notables){if(!n.alive)continue;n.age+=1/360;let risk=n.age>70?.0008*(n.age-65):.00003;if(hisR()<risk){n.alive=false;chronicle('crown',8,world.settlements[world.houses[n.house].seatSettlement],`${n.name} died in the ${Math.floor(n.age)}th year of life, and the bells were tolled.`); if(n.role==='Monarch'){let heir=world.notables.find(x=>x.alive&&x.role==='Heir');if(heir){heir.role='Monarch';chronicle('crown',9,world.settlements[0],`${heir.name} was crowned before the high altar, while the houses watched in silence.`)}else chronicle('war',10,world.settlements[0],`The crown lay ownerless, and every lord remembered an ancient claim.`)}}}}
function spawnArmy(h,s){let m=new THREE.Mesh(new THREE.ConeBufferGeometry(25,80,5),new THREE.MeshLambertMaterial({color:new THREE.Color(h.colour)}));m.position.set(s.x,hWorld(s.x,s.z)+50,s.z);agentGroup.add(m);world.armies.push({house:h.id,strength:irnd(hisR,300,900),morale:65,supply:80,mesh:m});selectables.push({kind:'army',data:world.armies[world.armies.length-1],pos:m.position});director.queue.push({day:clock.day,class:'war',priority:8,pos:m.position,text:`The levy of ${h.name} took the road in grim order.`})}
function fates(){let r=world.rates.disaster;if(hisR()<.004*r){let s=choice(hisR,world.settlements);chronicle('fate',8,s,`A fire began in ${s.name}, leaping roof to roof before the rain could answer.`);burnSome(s)} if(hisR()<.002*r){chronicle('fate',7,choice(hisR,world.settlements),`A red comet crossed the night, and old women hid their mirrors.`);world.legitimacy=clamp(world.legitimacy-2,0,100)} if(world.rates.myth>0&&world.treasury>7000&&hisR()<.003*world.rates.myth){let s=world.settlements[0];world.treasury-=1000;chronicle('fate',10,s,`The dragon Vyrm of the High Teeth descended upon ${s.name} and took gold in fire-lit claws.`);burnSome(s,12)}}
function burnSome(s,n=6){for(let i=0;i<n;i++){let b=choice(hisR,s.buildings);b.state='ruin';}s.prosperity=clamp(s.prosperity-8,0,100);s.unrest=clamp(s.unrest+9,0,100)}
function growth(){for(const s of world.settlements){if(s.prosperity>68&&hisR()<.003){let x=s.x+rnd(hisR,-260,260),z=s.z+rnd(hisR,-260,260);s.buildings.push({settlement:s.id,archetype:'house',tier:irnd(hisR,0,2),x,z,y:hWorld(x,z),rot:hisR()*TAU,state:'sound',emissive:true});chronicle('trade',6,s,`New houses rose on the edge of ${s.name}, for trade had made the folk bold.`); rebuildBuildings();break;}}}
function rebuildBuildings(){selectables=selectables.filter(o=>o.kind!=='building'&&o.kind!=='settlement');for(let i=scene.children.length-1;i>=0;i--){let o=scene.children[i];if(o.isInstancedMesh&&o.userData.kind==='buildings')scene.remove(o)}buildingMeshes();}
function renderChronicle(){const list=document.getElementById('entries');list.innerHTML='';let evs=world.events.filter(e=>world.filter==='all'||e.class===world.filter).slice(0,80);for(const e of evs){let div=document.createElement('div');div.className='entry '+e.class;div.innerHTML=`<div class="date">${dateText(e.day)}</div><div class="txt">${e.text}</div>`;div.onclick=()=>flyTo(e.pos,700,14);list.appendChild(div);}}
function updateControls(){let c=document.getElementById('controls');c.innerHTML=`<div class="section"><b>Rates</b>${slider('Harvest yield','harvest',.25,4,world.rates.harvest)}${slider('Birth rate','birth',.25,4,world.rates.birth)}${slider('Trade volume','trade',.25,4,world.rates.trade)}${slider('Disaster frequency','disaster',.25,4,world.rates.disaster)}${slider('House aggression','aggression',.25,4,world.rates.aggression)}<label>Tax rate <span id="taxv">${Math.round(world.rates.tax*100)}%</span></label><input data-rate="tax" type="range" min="5" max="30" step="1" value="${world.rates.tax*100}"><label>Myth <span>${['Off','Low','High'][world.rates.myth]}</span></label><input data-rate="myth" type="range" min="0" max="2" step="1" value="${world.rates.myth}"></div><div class="section"><b>Acts</b><div class="grid"><button data-act="plague">Unleash plague</button><button data-act="fire">Start a great fire</button><button data-act="drought">Declare a drought</button><button data-act="quake">Earthquake</button><button data-act="dragon">Wake the dragon</button><button data-act="assassin">Assassinate monarch</button><button data-act="contest">Contest succession</button><button data-act="bless">Bless harvest</button><button data-act="comet">Send a comet</button><button data-act="gold">Grant 5,000 gold</button></div></div><div class="section"><b>World</b><label>Seed</label><input id="seedInp" type="text" value="${world.seed}"><div class="grid" style="margin-top:8px"><button id="reforge">Reforge</button><button id="copy">Copy link</button><button id="export">Export chronicle</button><button id="watch">Watch mode</button></div><p class="small">Hotkeys: Space pause, 1–4 speeds, H hide UI, C watch mode, Esc deselect.</p></div>`;c.querySelectorAll('[data-rate]').forEach(el=>el.oninput=e=>{let k=e.target.dataset.rate,v=+e.target.value;if(k==='tax')world.rates.tax=v/100;else world.rates[k]=v;updateControls()});c.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>act(b.dataset.act));document.getElementById('reforge').onclick=()=>{location.hash='s='+encodeURIComponent(document.getElementById('seedInp').value||Date.now());location.reload()};document.getElementById('copy').onclick=()=>navigator.clipboard&&navigator.clipboard.writeText(location.href);document.getElementById('export').onclick=exportChronicle;document.getElementById('watch').onclick=()=>document.body.classList.toggle('watch');}
function slider(name,key,min,max,val){return `<label>${name} <span>${Number(val).toFixed(2)}×</span></label><input data-rate="${key}" type="range" min="${min}" max="${max}" step=".05" value="${val}">`}
function act(a){let s=choice(hisR,world.settlements);if(a==='plague'){s.infected.I=s.pop*.12;chronicle('fate',10,s,`A black sickness entered ${s.name} by the trade road, and the doors were marked in ash.`)}if(a==='fire'){chronicle('fate',9,s,`A great fire was kindled at ${s.name}, and the town cried out beneath the sparks.`);burnSome(s,18)}if(a==='drought'){world.rates.harvest=.4;chronicle('fate',8,s,`The summer hardened into drought, and the fields yellowed before their time.`);updateControls()}if(a==='quake'){chronicle('fate',9,s,`The earth shook under ${s.name}, cracking walls and chapel stones alike.`);burnSome(s,10)}if(a==='dragon'){world.treasury+=6000;chronicle('fate',10,world.settlements[0],`Vyrm of the High Teeth woke, scenting the king's swollen treasury.`)}if(a==='assassin'){let m=monarch();m.alive=false;chronicle('crown',10,world.settlements[0],`${m.name} was found dead before dawn, and no hand confessed the deed.`)}if(a==='contest'){for(const h of world.houses.slice(1))h.loyalty-=30;chronicle('war',10,world.settlements[0],`The succession was contested, and every great hall filled with sharpened counsel.`)}if(a==='bless'){world.rates.harvest=2;chronicle('trade',7,s,`The harvest was blessed, and carts groaned beneath yellow grain.`);updateControls()}if(a==='comet')chronicle('fate',8,s,`A comet burned above ${world.title}, and even brave men lowered their eyes.`);if(a==='gold'){world.treasury+=5000;chronicle('crown',5,world.settlements[0],`Five thousand gold crowns were granted to the treasury, and the dragon-songs grew louder.`)}}
function exportChronicle(){let txt=`The Annals of ${world.title}\nSeed: ${world.seed}\n\n`+world.events.slice().reverse().map(e=>`${dateText(e.day)} — ${e.text}`).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));a.download=`annals-${world.seed}.txt`;a.click()}
function updateHUD(){let m=monarch(),h=world.houses[m.house];document.getElementById('meta').innerHTML=`<span class="chip">${dateText(Math.floor(clock.day))}</span><span class="chip">${world.season} · ${world.weather}</span><span class="chip"><span class="sigil" style="background:${h.colour}"></span>${m.name}</span><span class="chip">Treasury ${Math.floor(world.treasury).toLocaleString()}g</span><span class="chip">Pop ${world.pop.toLocaleString()}</span>`;document.querySelectorAll('#timeBtns button').forEach(b=>b.classList.toggle('active',+b.dataset.spd===clock.speed))}
function cameraControls(dt){let canvas=renderer.domElement;if(!camera.userData.target)camera.userData.target=new THREE.Vector3(0,0,0);let tgt=camera.userData.target;let sp=dt*900;if(keys.KeyW)tgt.z-=sp;if(keys.KeyS)tgt.z+=sp;if(keys.KeyA)tgt.x-=sp;if(keys.KeyD)tgt.x+=sp;let alt=clamp(camera.position.y,8,4200),tilt=lerp(18,78,clamp((alt-80)/3000,0,1))*Math.PI/180;let desired=new THREE.Vector3(tgt.x,alt,tgt.z+alt/Math.tan(tilt)); if(camera.userData.fly){let f=camera.userData.fly,t=clamp((performance.now()-f.t0)/f.dur,0,1),e=t*t*(3-2*t);desired.lerpVectors(f.from,f.to,e);tgt.lerpVectors(f.tfrom,f.tto,e);if(t>=1)camera.userData.fly=null;} camera.position.lerp(desired,1-Math.exp(-dt*5));camera.lookAt(tgt.x,hWorld(tgt.x,tgt.z)+20,tgt.z);}
function flyTo(pos,alt=500,dur=3000){camera.userData.fly={t0:performance.now(),dur,from:camera.position.clone(),to:new THREE.Vector3(pos.x,alt,pos.z+alt*.75),tfrom:camera.userData.target?camera.userData.target.clone():new THREE.Vector3(),tto:new THREE.Vector3(pos.x,hWorld(pos.x,pos.z)+15,pos.z)};director.suspend=clock.day+10;}
function directorUpdate(){if(document.body.classList.contains('watch')||true){let now=clock.day;if(director.queue.length&&now>director.suspend){director.queue.sort((a,b)=>b.priority-a.priority);let e=director.queue.shift();director.target=e;director.until=now+Math.max(8,20-e.priority);flyTo(e.pos, e.priority>8?420:750,2200);let b=document.getElementById('beat');b.style.display='block';b.querySelector('.beat-title').textContent=e.text;b.querySelector('.beat-sub').textContent=dateText(e.day)} if(now>director.until&&world.settlements.length&&now>director.suspend){let s=choice(hisR,world.settlements);flyTo(new THREE.Vector3(s.x,s.y,s.z),900,3500);director.until=now+18;}}}
function inspect(obj){let d=obj.data,html=''; if(obj.kind==='settlement')html=`<h3>${d.name}</h3><div class="small">${d.type} · ${world.houses[d.owner].name}</div><p>Population ${Math.floor(d.pop).toLocaleString()} · Prosperity ${Math.floor(d.prosperity)} · Unrest ${Math.floor(d.unrest)}</p><label>Prosperity</label><div class="bar"><span style="width:${d.prosperity}%"></span></div><label>Unrest</label><div class="bar"><span style="width:${d.unrest}%"></span></div>`; if(obj.kind==='building')html=`<h3>${d.archetype}</h3><div class="small">Tier ${d.tier+1} · ${d.state}</div><p>A ${d.archetype} in ${world.settlements[d.settlement].name}. ${d.emissive?'Its windows burn warmly at night.':'Its shutters are dark.'}</p>`; if(obj.kind==='caravan')html=`<h3>Caravan</h3><p>Route: ${world.settlements[d.origin].name} → ${world.settlements[d.dest].name}</p><p>Cargo ${d.cargo}, value ${d.value}g.</p>`; if(obj.kind==='army')html=`<h3>Army</h3><p>${world.houses[d.house].name} · Strength ${d.strength} · Morale ${d.morale}</p>`;let el=document.getElementById('inspector');el.innerHTML=html;el.style.display='block'}
function pick(e){mouse.x=e.clientX/innerWidth*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;raycaster.setFromCamera(mouse,camera);let best=null,bd=80;for(const o of selectables){let p=o.pos instanceof THREE.Vector3?o.pos:new THREE.Vector3(o.data.x,o.data.y,o.data.z);let sp=p.clone().project(camera);let sx=(sp.x*.5+.5)*innerWidth,sy=(-sp.y*.5+.5)*innerHeight,dd=Math.hypot(sx-e.clientX,sy-e.clientY);if(dd<bd){bd=dd;best=o}} if(best){inspect(best);flyTo(best.pos instanceof THREE.Vector3?best.pos:new THREE.Vector3(best.data.x,best.data.y,best.data.z),450,1600)} }
function labelsUpdate(){for(const l of labels){let p=new THREE.Vector3(l.s.x,l.s.y+80,l.s.z).project(camera);l.el.style.left=(p.x*.5+.5)*innerWidth+'px';l.el.style.top=(-p.y*.5+.5)*innerHeight+'px';l.el.style.display=(p.z<1&&camera.position.y>120)?'block':'none'}}
function animate(t){requestAnimationFrame(animate);let dt=Math.min(.05,(t-(animate.last||t))/1000);animate.last=t;clock.acc+=dt*clock.speed;while(clock.acc>=1){tick();clock.acc-=1} updateAgents();cameraControls(dt);directorUpdate();labelsUpdate();updateHUD();renderer.render(scene,camera)}
function boot(){let seed=(location.hash.match(/s=([^&]+)/)||[])[1]||String(Math.floor(Math.random()*1e9));location.hash='s='+encodeURIComponent(seed);makeWorld(seed);renderWorld();raycaster=new THREE.Raycaster();mouse=new THREE.Vector2();addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space')clock.speed=clock.speed?0:2;if(['Digit1','Digit2','Digit3','Digit4'].includes(e.code))clock.speed=[.5,2,8,30][+e.code.slice(-1)-1];if(e.code==='KeyH')document.body.classList.toggle('clean');if(e.code==='KeyC')document.body.classList.toggle('watch');if(e.code==='Escape')document.getElementById('inspector').style.display='none'});addEventListener('keyup',e=>keys[e.code]=false);renderer.domElement.addEventListener('click',pick);renderer.domElement.addEventListener('wheel',e=>{camera.position.y=clamp(camera.position.y*(1+Math.sign(e.deltaY)*.12),8,4200);director.suspend=clock.day+30},{passive:true});let dragging=false,last={x:0,y:0};renderer.domElement.addEventListener('pointerdown',e=>{dragging=true;last={x:e.clientX,y:e.clientY};director.suspend=clock.day+30});addEventListener('pointerup',()=>dragging=false);addEventListener('pointermove',e=>{if(!dragging)return;let dx=e.clientX-last.x,dy=e.clientY-last.y;last={x:e.clientX,y:e.clientY};let tgt=camera.userData.target||new THREE.Vector3();tgt.x-=dx*camera.position.y/900;tgt.z-=dy*camera.position.y/900;camera.userData.target=tgt});document.querySelectorAll('#timeBtns button').forEach(b=>b.onclick=()=>clock.speed=+b.dataset.spd);document.querySelectorAll('.filters button').forEach(b=>b.onclick=()=>{world.filter=b.dataset.filter;document.querySelectorAll('.filters button').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderChronicle()});document.getElementById('forge').style.opacity=0;setTimeout(()=>document.getElementById('forge').classList.add('hidden'),500);animate(performance.now())}
boot();
</script>
