<script>
'use strict';
const W=6000,N=96,HALF=W/2,TAU=Math.PI*2;
const goods=['grain','fish','timber','ore','tools','cloth','wine'];
const sylA=['Vael','Oster','Ald','Bran','Mere','Eld','Thorn','Wych','Har','Fen','Cor','Luth','Ash','Raven','Briar','Grey','Stone','Low'];
const sylB=['mere','ford','holt','caster','wyck','fall','haven','bridge','field','wick','barrow','gate','watch','water'];
const male=['Aldric','Oswin','Cedric','Garran','Leof','Warin','Baldor','Edrin','Theomund','Harlan','Godric','Merek'];
const female=['Maelis','Ysella','Elowen','Britha','Aveline','Rowena','Mira','Seren','Alys','Edith','Caelia','Isolde'];
const beasts=['Stag','Wolf','Oak','Comet','Tower','Wave','Key','Sun','Boar','Raven','Lily','Fox'];
const traits=['bold','craven','just','cruel','shrewd','dull','pious','cynical','fertile','sickly','proud','patient','wrathful','kind','avaricious','melancholic'];
function xmur3(str){let h=1779033703^str.length;for(let i=0;i<str.length;i++){h=Math.imul(h^str.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return function(){h=Math.imul(h^h>>>16,2246822507);h=Math.imul(h^h>>>13,3266489909);return (h^h>>>16)>>>0}}
function sfc32(a,b,c,d){return function(){a>>>=0;b>>>=0;c>>>=0;d>>>=0;let t=(a+b)|0;a=b^b>>>9;b=(c+(c<<3))|0;c=(c<<21|c>>>11);d=(d+1)|0;t=(t+d)|0;c=(c+t)|0;return (t>>>0)/4294967296}}
function rngFrom(seed,tag){const f=xmur3(seed+':'+tag);return sfc32(f(),f(),f(),f())}
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),lerp=(a,b,t)=>a+(b-a)*t,choice=(r,a)=>a[Math.floor(r()*a.length)],rnd=(r,a,b)=>a+r()*(b-a),irnd=(r,a,b)=>Math.floor(rnd(r,a,b+1)),dist=(a,b)=>Math.hypot(a.x-b.x,a.z-b.z);
function namePlace(r){return choice(r,sylA)+choice(r,sylB)}function person(r,sex){return choice(r,sex==='f'?female:male)+' '+choice(r,['of','at','de'])+' '+namePlace(r)}
let genR,hisR,scene,camera,renderer,raycaster,mouse,world,agentGroup,propGroup,roadGroup,selectables=[],labels=[],buildingMesh,smoke=[],banners=[],marketProps=[];
const clock={day:1,speed:2,acc:0};const director={queue:[],until:0,suspend:0,target:null};const keys={};
function valueNoise(seed,x,y){let xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;function n(a,b){let s=Math.sin((a*127.1+b*311.7+seed)*437.58)*43758.5453;return s-Math.floor(s)}let u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);return lerp(lerp(n(xi,yi),n(xi+1,yi),u),lerp(n(xi,yi+1),n(xi+1,yi+1),u),v)}
function fbm(seed,x,y){let v=0,a=.5,f=1;for(let o=0;o<5;o++){v+=a*valueNoise(seed,x*f,y*f);f*=2;a*=.5}return v}
function gi(x){return clamp(Math.round(x),0,N)}function gidx(i,j){return gi(j)*(N+1)+gi(i)}function worldToGrid(x,z){return {i:(x+HALF)/W*N,j:(z+HALF)/W*N}}
function hGrid(i,j){return world.heights[gidx(i,j)]||0}function hWorld(x,z){const g=worldToGrid(x,z),i=Math.floor(g.i),j=Math.floor(g.j),tx=g.i-i,tz=g.j-j;return lerp(lerp(hGrid(i,j),hGrid(i+1,j),tx),lerp(hGrid(i,j+1),hGrid(i+1,j+1),tx),tz)}
function makeWorld(seed){genR=rngFrom(seed,'generation');hisR=rngFrom(seed,'history');const title=namePlace(genR);world={seed,title,heights:[],biomes:[],rivers:[],settlements:[],roads:[],houses:[],notables:[],caravans:[],armies:[],events:[],tradeStats:{trips:0,value:0},treasury:3500,legitimacy:72,weather:'Clear',season:'Spring',pop:0,filter:'all',rates:{harvest:1,birth:1,mortality:1,trade:1,tax:.12,disaster:1,bandit:1,aggression:1,myth:1},overlay:'none'};document.title='The Annals of '+title;document.getElementById('title').textContent='The Annals of '+title;terrain();hydrology();settlements();roads();houses();cast();}
function terrain(){const coast=genR()<.42?choice(genR,['N','S','E','W']):null,spine=genR()*TAU;for(let j=0;j<=N;j++)for(let i=0;i<=N;i++){let x=i/N*2-1,z=j/N*2-1;let warp=fbm(22,x*2+3,z*2-1)-.5;let nx=x+warp*.28,nz=z+warp*.28;let base=fbm(7,nx*2.2,nz*2.2);let ridge=Math.exp(-Math.pow(nx*Math.cos(spine)+nz*Math.sin(spine)-.13,2)*10);let h=(base-.38)*190+ridge*560;if(coast){let edge=coast==='N'?(1-z):coast==='S'?(z+1):coast==='E'?(1-x):(x+1);h-=Math.max(0,.36-edge)*950}h=clamp(h,-24,760);world.heights.push(h);let moist=fbm(42,x*2-1,z*2+4);let b=h<3?'water':h>510?'rock':h>310?'pine':moist>.66?'forest':moist<.24?'meadow':h<90?'farm':'meadow';world.biomes.push(b)}}
function hydrology(){let best={x:0,z:0,h:-999};for(let k=0;k<260;k++){let x=rnd(genR,-2200,2200),z=rnd(genR,-2200,2200),h=hWorld(x,z);if(h>best.h)best={x,z,h}}let p={x:best.x,z:best.z};for(let k=0;k<82;k++){let chosen=p,bh=hWorld(p.x,p.z)-k*.8;for(let a=0;a<14;a++){let q={x:p.x+Math.cos(a/14*TAU)*110,z:p.z+Math.sin(a/14*TAU)*110};let hh=hWorld(q.x,q.z)-k*1.8;if(hh<bh){bh=hh;chosen=q}}world.rivers.push({x:chosen.x,z:chosen.z,w:22+k*.45});p=chosen;if(Math.abs(p.x)>HALF-80||Math.abs(p.z)>HALF-80||hWorld(p.x,p.z)<2)break}for(let t=0;t<3;t++){let idx=irnd(genR,12,Math.max(14,world.rivers.length-18));let base=world.rivers[idx];let q={x:base.x+rnd(genR,-900,900),z:base.z+rnd(genR,-900,900)};for(let k=0;k<24;k++){world.rivers.push({x:lerp(q.x,base.x,k/24),z:lerp(q.z,base.z,k/24),w:9})}}}
function nearRiver(x,z){let d=1e9;for(const r of world.rivers)d=Math.min(d,Math.hypot(x-r.x,z-r.z));return d}
function biomeAt(x,z){let g=worldToGrid(x,z);return world.biomes[gidx(g.i,g.j)]||'meadow'}
function settlements(){let candidates=[];for(let k=0;k<900;k++){let x=rnd(genR,-2600,2600),z=rnd(genR,-2600,2600),h=hWorld(x,z),b=biomeAt(x,z);if(h<5||h>260)continue;let water=Math.max(0,260-nearRiver(x,z));let flat=0;for(let a=0;a<6;a++){let q={x:x+rnd(genR,-90,90),z:z+rnd(genR,-90,90)};flat+=Math.abs(h-hWorld(q.x,q.z))}flat=180-flat;let score=water*1.2+flat+(b==='farm'?120:0)+(b==='forest'?30:0)+(b==='meadow'?40:0);candidates.push({x,z,y:h,score})}candidates.sort((a,b)=>b.score-a.score);let placed=[];for(const c of candidates){if(placed.every(s=>dist(c,s)>720)){placed.push(c);if(placed.length>=9)break}}placed.forEach((p,i)=>{let type=i===0?'capital':i<4?'town':'village';let pop=type==='capital'?irnd(genR,2200,3100):type==='town'?irnd(genR,520,1250):irnd(genR,80,320);let s={id:i,name:namePlace(genR),type,x:p.x,z:p.z,y:p.y,pop,prosperity:irnd(genR,45,78),unrest:irnd(genR,6,24),walls:type==='capital'?70:type==='town'?irnd(genR,15,45):0,garrison:Math.floor(pop*.08),owner:0,stores:{},prices:{},production:{},buildings:[],market:{x:p.x+rnd(genR,-35,35),z:p.z+rnd(genR,-35,35)},infected:{S:pop,I:0,R:0},growth:0};goods.forEach(g=>{s.stores[g]=irnd(genR,20,160);s.prices[g]=1;s.production[g]=0});let b=biomeAt(p.x,p.z);s.production.grain=(b==='farm'||type==='village'?1.1:.35);s.production.timber=(b==='forest'||b==='pine'?1:.25);s.production.fish=nearRiver(p.x,p.z)<140?.8:.08;s.production.ore=hWorld(p.x,p.z)>170?.7:.1;s.production.tools=type==='town'||type==='capital'?.45:.05;s.production.cloth=type==='capital'?.65:type==='town'?.25:.05;s.production.wine=type==='capital'||b==='farm'?.35:.02;makeBuildings(s);world.settlements.push(s)})}
function makeBuildings(s){let count=s.type==='capital'?420:s.type==='town'?160:48;let arche=['house','house','house','shop','tavern','granary','smithy','warehouse','temple','longhouse'];for(let i=0;i<count;i++){let ring=Math.sqrt(genR()),ang=genR()*TAU,rad=(s.type==='capital'?480:s.type==='town'?270:135)*ring;let x=s.x+Math.cos(ang)*rad,z=s.z+Math.sin(ang)*rad,y=hWorld(x,z);if(y<4)continue;let a=i===0&&s.type==='capital'?'keep':choice(genR,arche);let tier=a==='keep'?2:clamp(Math.floor((s.prosperity/38)+genR()*1.4),0,2);s.buildings.push({settlement:s.id,archetype:a,tier,state:'sound',x,z,y,rot:ang+Math.PI/2,emissive:genR()<.34,store:irnd(genR,1,12)})}}
function roads(){for(let i=1;i<world.settlements.length;i++){let a=world.settlements[i],b=world.settlements[0];road(a,b)}for(let i=1;i<world.settlements.length-1;i++)road(world.settlements[i],world.settlements[i+1])}
function road(a,b){let pts=[],steps=Math.ceil(dist(a,b)/115);for(let k=0;k<=steps;k++){let t=k/steps,wig=Math.sin(t*Math.PI)*Math.sin((a.id*17+b.id*31+t*8))*90;let dx=b.x-a.x,dz=b.z-a.z,len=Math.hypot(dx,dz)||1;let x=lerp(a.x,b.x,t)+(-dz/len)*wig,z=lerp(a.z,b.z,t)+(dx/len)*wig,y=hWorld(x,z)+3;pts.push({x,y,z})}world.roads.push({a:a.id,b:b.id,pts,traffic:0})}
function houses(){const cols=['#8b1e2d','#235d86','#3d7b47','#8b6b23','#6f3c87','#7b3f22'];world.settlements.forEach((s,i)=>{let h={id:i<6?i:0,name:'House '+(i===0?choice(genR,beasts):choice(genR,beasts)+' '+choice(genR,sylB)),seatSettlement:s.id,loyalty:i===0?100:irnd(genR,42,86),might:Math.floor(s.pop*.28),wealth:irnd(genR,200,900),colour:cols[i%cols.length],charge:choice(genR,beasts),grudges:{}};if(i<6)world.houses.push(h);s.owner=Math.min(i,5)})}
function cast(){for(const h of world.houses){let headSex=hisR()<.5?'f':'m';let head={id:world.notables.length,name:person(hisR,headSex),sex:headSex,house:h.id,age:irnd(hisR,24,63),traits:[choice(hisR,traits),choice(hisR,traits)],role:h.id===0?'Monarch':'Lord',alive:true,spouse:null,heirs:[],agenda:h.id===0?'hold the crown':'increase the house'};world.notables.push(head);let spouseSex=headSex==='f'?'m':'f';let spouse={id:world.notables.length,name:person(hisR,spouseSex),sex:spouseSex,house:h.id,age:clamp(head.age+irnd(hisR,-8,8),18,70),traits:[choice(hisR,traits),choice(hisR,traits)],role:'Consort',alive:true,spouse:head.id,heirs:[],agenda:'secure the line'};head.spouse=spouse.id;world.notables.push(spouse);let kids=irnd(hisR,1,4);for(let k=0;k<kids;k++){let sex=hisR()<.5?'f':'m';let child={id:world.notables.length,name:person(hisR,sex),sex,house:h.id,age:irnd(hisR,2,28),traits:[choice(hisR,traits),choice(hisR,traits)],role:h.id===0&&k===0?'Heir':'Scion',alive:true,spouse:null,heirs:[],agenda:'await fortune'};head.heirs.push(child.id);world.notables.push(child)}}}
function monarch(){return world.notables.find(n=>n.alive&&n.role==='Monarch')||world.notables.find(n=>n.alive&&n.house===0)}
function setupScene(){scene=new THREE.Scene();scene.fog=new THREE.Fog(0x9fb5c6,1500,7600);camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,12000);camera.position.set(0,1900,2650);camera.userData.target=new THREE.Vector3(0,0,0);renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;document.getElementById('app').appendChild(renderer.domElement);scene.add(new THREE.HemisphereLight(0xd9ecff,0x4b3423,1.04));const sun=new THREE.DirectionalLight(0xfff1c2,1.75);sun.position.set(-1200,2300,900);sun.castShadow=true;scene.add(sun);const sky=new THREE.Mesh(new THREE.SphereGeometry(8200,32,16),new THREE.MeshBasicMaterial({color:0x8fb2d8,side:THREE.BackSide}));scene.add(sky);terrainMesh();waterMesh();roadMeshes();buildingMeshes();treeMeshes();propsMeshes();agentMeshes();makeLabels();updateControls();updateHUD()}
function terrainMesh(){const g=new THREE.PlaneBufferGeometry(W,W,N,N);g.rotateX(-Math.PI/2);const pos=g.attributes.position,cols=[];for(let i=0;i<pos.count;i++){let x=pos.getX(i),z=pos.getZ(i),h=hWorld(x,z);pos.setY(i,h);let b=world.biomes[i]||'meadow',c=new THREE.Color(b==='water'?0x345f79:b==='farm'?0x8ca75f:b==='forest'?0x3e6f43:b==='pine'?0x315641:b==='rock'?0x8e8780:0x73a85b);c.multiplyScalar(.84+(h/760)*.28);cols.push(c.r,c.g,c.b)}g.setAttribute('color',new THREE.Float32BufferAttribute(cols,3));g.computeVertexNormals();const mesh=new THREE.Mesh(g,new THREE.MeshLambertMaterial({vertexColors:true}));mesh.receiveShadow=true;scene.add(mesh)}
function waterMesh(){const mat=new THREE.LineBasicMaterial({color:0x4e91b0,transparent:true,opacity:.95});for(let pass=0;pass<4;pass++){const pts=world.rivers.map(r=>new THREE.Vector3(r.x+(pass-1.5)*4,hWorld(r.x,r.z)+5,r.z+(pass-1.5)*2));scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),mat))}const sea=new THREE.Mesh(new THREE.PlaneBufferGeometry(W,W,1,1),new THREE.MeshLambertMaterial({color:0x315f7a,transparent:true,opacity:.42}));sea.rotation.x=-Math.PI/2;sea.position.y=0;scene.add(sea)}
function roadMeshes(){roadGroup=new THREE.Group();scene.add(roadGroup);const mat=new THREE.LineBasicMaterial({color:0x755a38,transparent:true,opacity:.9});for(const r of world.roads){let line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(r.pts.map(p=>new THREE.Vector3(p.x,p.y+2,p.z))),mat);roadGroup.add(line)}}
function buildingMeshes(){let arr=[];world.settlements.forEach(s=>arr.push(...s.buildings));const dummy=new THREE.Object3D(),box=new THREE.BoxBufferGeometry(1,1,1);buildingMesh=new THREE.InstancedMesh(box,new THREE.MeshLambertMaterial({color:0xc9b38c}),arr.length);buildingMesh.castShadow=true;buildingMesh.receiveShadow=true;arr.forEach((b,i)=>{let sx=b.archetype==='keep'?74:rnd(genR,15,34),sz=b.archetype==='keep'?86:rnd(genR,17,39),sy=b.archetype==='keep'?105:(18+b.tier*13+rnd(genR,0,16));dummy.position.set(b.x,b.y+sy/2,b.z);dummy.rotation.y=b.rot;dummy.scale.set(sx,sy,sz);dummy.updateMatrix();buildingMesh.setMatrixAt(i,dummy.matrix);b.instance=i;b.size={sx,sy,sz};buildingMesh.setColorAt(i,buildingColour(b));selectables.push({kind:'building',data:b,pos:new THREE.Vector3(b.x,b.y,b.z)})});scene.add(buildingMesh);for(const s of world.settlements)selectables.push({kind:'settlement',data:s,pos:new THREE.Vector3(s.x,s.y,s.z)})}

function makeLabels(){labels.forEach(l=>l.el.remove());labels=[];for(const s of world.settlements){let el=document.createElement('div');el.className='label '+(s.type==='capital'?'capital':'');el.textContent=s.name;document.body.appendChild(el);labels.push({el,s})}}
function chronicle(cls,priority,target,text){let pos;if(target&&target.isVector3)pos=target.clone();else if(target&&typeof target.x==='number')pos=new THREE.Vector3(target.x,target.y||hWorld(target.x,target.z),target.z);else pos=new THREE.Vector3();let ev={day:Math.floor(clock.day),class:cls,priority,pos,text};world.events.unshift(ev);director.queue.push(ev);renderChronicle();return ev}
function dateText(day){let y=Math.floor((day-1)/360)+1,d=(day-1)%360+1,seas=['Spring','Summer','Autumn','Winter'];return `Year ${y}, ${seas[Math.floor((d-1)/90)]} ${((d-1)%90)+1}`}
function renderChronicle(){const e=document.getElementById('entries');const rows=world.events.filter(ev=>world.filter==='all'||ev.class===world.filter).slice(0,120);e.innerHTML=rows.map((ev,i)=>`<div class="entry ${ev.class}" data-i="${i}"><div class="date">${dateText(ev.day)}</div><div class="txt">${ev.text}</div></div>`).join('');[...e.children].forEach((el,i)=>el.onclick=()=>flyTo(rows[i].pos,520,1800))}
function tick(){clock.day++;let d=(clock.day-1)%360;let old=world.season;world.season=['Spring','Summer','Autumn','Winter'][Math.floor(d/90)];if(world.season!==old)chronicle('fate',4,world.settlements[0],`${world.season} came upon ${world.title}, changing the colour of field and wood.`);weather();economy();population();politics();threats();growth();tradeSpawn();}
function weather(){let season=world.season;let roll=hisR();world.weather=season==='Winter'&&roll<.25?'Snow':roll<.1?'Rain':roll<.13?'Storm':roll<.28?'Overcast':'Clear'}
function economy(){world.pop=0;for(const s of world.settlements){for(const g of goods){let prod=s.production[g]*(world.season==='Summer'?1.25:world.season==='Winter'?.55:1);if(g==='grain')prod*=world.rates.harvest;if(world.weather==='Storm')prod*=.85;s.stores[g]=clamp(s.stores[g]+prod-s.pop*(g==='grain'?.012:g==='fish'?.003:g==='tools'?.0008:g==='cloth'?.0006:g==='wine'?.0004:.001),0,9000);let need=s.pop*(g==='grain'?.09:g==='fish'?.025:g==='tools'?.012:g==='cloth'?.011:g==='wine'?.006:.018);s.prices[g]=clamp(need/(s.stores[g]+18),.35,4.5)}let food=s.stores.grain+s.stores.fish*.8;if(food<s.pop*.035){s.unrest=clamp(s.unrest+1.8,0,100);s.prosperity=clamp(s.prosperity-.5,0,100);if(hisR()<.015)chronicle('fate',6,s,`Hunger walked the lanes of ${s.name}, and the granary doors were opened by force.`)}else{s.unrest=clamp(s.unrest-.25,0,100);s.prosperity=clamp(s.prosperity+.08,0,100)}world.treasury+=s.pop*world.rates.tax*.004;world.pop+=Math.floor(s.pop)}}

function politics(){for(const h of world.houses){if(h.id===0)continue;let seat=world.settlements[h.seatSettlement];h.loyalty=clamp(h.loyalty+(world.rates.tax>.18?-.06:.012)*world.rates.aggression-(seat.unrest>60?.05:0),0,100);if(h.loyalty<24&&hisR()<.012*world.rates.aggression){chronicle('war',10,seat,`${h.name} raised its banner against the crown at ${seat.name}, and the road filled with armed men.`);spawnArmy(h,seat);h.loyalty+=28}}for(const n of world.notables){if(!n.alive)continue;n.age+=1/360;let risk=(n.age>65?.00055*(n.age-64):.00003)*world.rates.mortality;if(hisR()<risk){n.alive=false;let seat=world.settlements[world.houses[n.house].seatSettlement];chronicle('crown',8,seat,`${n.name} died in the ${Math.floor(n.age)}th year of life, and the bells were tolled.`);if(n.role==='Monarch'){let heir=world.notables.find(x=>x.alive&&x.role==='Heir');if(heir){heir.role='Monarch';chronicle('crown',9,world.settlements[0],`${heir.name} was crowned before the high altar, while the houses watched in silence.`)}else{chronicle('war',10,world.settlements[0],`The crown lay ownerless, and every lord remembered an ancient claim.`);for(const h of world.houses.slice(1))h.loyalty-=30}}}}}
function threats(){let r=world.rates.disaster;if(hisR()<.003*r){let s=choice(hisR,world.settlements);chronicle('fate',8,s,`A fire began in ${s.name}, leaping roof to roof before the rain could answer.`);burnSome(s,irnd(hisR,6,18))}if(hisR()<.0016*r){let s=choice(hisR,world.settlements);s.infected.I=Math.max(s.infected.I,s.pop*.06);chronicle('fate',9,s,`A black sickness entered ${s.name} by the trade road, and the doors were marked in ash.`)}if(hisR()<.002*r){chronicle('fate',7,choice(hisR,world.settlements),`A red comet crossed the night, and old women hid their mirrors.`);world.legitimacy=clamp(world.legitimacy-2,0,100)}if(world.rates.myth>0&&world.treasury>7600&&hisR()<.003*world.rates.myth){let s=world.settlements[0];world.treasury-=1200;chronicle('fate',10,s,`The dragon Vyrm of the High Teeth descended upon ${s.name} and took gold in fire-lit claws.`);burnSome(s,14)}}
function burnSome(s,n){for(let i=0;i<n;i++){let b=choice(hisR,s.buildings);b.state=hisR()<.35?'ruin':'burning'}s.prosperity=clamp(s.prosperity-8,0,100);s.unrest=clamp(s.unrest+9,0,100);refreshBuildingColours()}

function tradeSpawn(){let target=Math.floor(10+24*world.rates.trade);if(world.caravans.length<target&&hisR()<.18*world.rates.trade)spawnCaravan();if(hisR()<.018*world.rates.trade){let a=choice(hisR,world.settlements),b=choice(hisR,world.settlements);if(a!==b){let c=spawnCaravan(a.id,b.id);if(c)chronicle('trade',5,a,`A mule train departed ${a.name} for ${b.name}, bearing ${c.cargo} under patched awnings.`)}}}
function spawnArmy(h,s){let m=new THREE.Mesh(new THREE.ConeBufferGeometry(25,80,5),new THREE.MeshLambertMaterial({color:new THREE.Color(h.colour)}));m.position.set(s.x,hWorld(s.x,s.z)+50,s.z);agentGroup.add(m);let army={house:h.id,strength:irnd(hisR,300,900),morale:65,supply:80,mesh:m};world.armies.push(army);selectables.push({kind:'army',data:army,pos:m.position})}
function updateAgents(){for(const c of world.caravans){let t=(clock.day-c.departT)/(c.arriveT-c.departT);if(t>=1){let o=world.settlements[c.origin],d=world.settlements[c.dest];let price=d.prices[c.cargo]||1;d.stores[c.cargo]=clamp(d.stores[c.cargo]+c.value/price,0,9000);d.prosperity=clamp(d.prosperity+.45,0,100);world.treasury+=c.value*world.rates.tax*.04;world.tradeStats.trips++;world.tradeStats.value+=c.value;if(d.infected.I>1&&hisR()<.18){o.infected.I=Math.max(o.infected.I,o.pop*.025);chronicle('fate',7,o,`Sickness followed a caravan home from ${d.name}, and ${o.name} began to close its gates.`)}chronicle('trade',5,d,`A caravan from ${o.name} came into ${d.name} with ${c.cargo}, and the market bells were rung.`);c.origin=c.dest;c.dest=choice(hisR,world.settlements).id;if(c.origin===c.dest)c.dest=(c.dest+1)%world.settlements.length;let road=findRoad(c.origin,c.dest);if(!road){let cand=world.roads.filter(r=>r.a===c.origin||r.b===c.origin);road=choice(hisR,cand);c.dest=road.a===c.origin?road.b:road.a}c.path=road.a===c.origin?road.pts:road.pts.slice().reverse();c.departT=clock.day;c.arriveT=clock.day+rnd(hisR,44,115);c.cargo=chooseCargo(world.settlements[c.origin],world.settlements[c.dest]).good;t=0}t=clamp(t,0,1);let f=t*(c.path.length-1),idx=Math.min(c.path.length-2,Math.floor(f)),lt=f-idx,p=c.path[idx],q=c.path[idx+1]||p;let x=lerp(p.x,q.x,lt),z=lerp(p.z,q.z,lt),y=hWorld(x,z)+18;c.mesh.position.set(x,y,z);c.mesh.rotation.y=Math.atan2(q.x-p.x,q.z-p.z);c.pos=c.mesh.position}}
function updateProps(t){for(const s of smoke){s.m.position.x=s.base.x+Math.sin(t*.001+s.phase)*8;s.m.position.y=s.base.y+(Math.sin(t*.0015+s.phase)+1)*12;s.m.material.opacity=.24+.1*Math.sin(t*.001+s.phase)}for(const b of banners){b.m.rotation.z=Math.sin(t*.003+b.phase)*.08}}

function updateControls(){const c=document.getElementById('controls');c.innerHTML=`<div class="section"><b>ANNALS v0.2</b><p class="small">Trade Roads & Living Settlements. Caravans now move goods, carry sickness, change prices, raise prosperity, and feed the Chronicle/director loop.</p></div><div class="section"><b>Rates</b>${slider('Harvest yield','harvest',.25,4,world.rates.harvest)}${slider('Birth rate','birth',.25,4,world.rates.birth)}${slider('Mortality','mortality',.25,4,world.rates.mortality)}${slider('Trade volume','trade',.25,4,world.rates.trade)}<label>Tax rate <span>${Math.round(world.rates.tax*100)}%</span></label><input data-rate="tax" type="range" min="5" max="30" step="1" value="${Math.round(world.rates.tax*100)}">${slider('Disaster frequency','disaster',.25,4,world.rates.disaster)}${slider('Bandit activity','bandit',.25,4,world.rates.bandit)}${slider('House aggression','aggression',.25,4,world.rates.aggression)}${slider('Myth','myth',0,2,world.rates.myth)}</div><div class="section"><b>Acts</b><div class="grid"><button data-act="plague">Unleash plague</button><button data-act="fire">Start great fire</button><button data-act="drought">Declare drought</button><button data-act="quake">Earthquake</button><button data-act="dragon">Wake dragon</button><button data-act="assassin">Assassinate monarch</button><button data-act="contest">Contest succession</button><button data-act="bless">Bless harvest</button><button data-act="comet">Send comet</button><button data-act="gold">Grant 5,000 gold</button><button data-act="festival">Hold festival</button><button data-act="caravan">Send caravan</button></div></div><div class="section"><b>World</b><label>Seed</label><input id="seedInp" type="text" value="${world.seed}"><div class="grid" style="margin-top:8px"><button id="reforge">Reforge</button><button id="copy">Copy link</button><button id="export">Export chronicle</button><button id="watch">Watch mode</button></div><div class="legend"><span>${world.caravans.length} caravans</span><span>${world.tradeStats.trips} arrivals</span><span>${Math.floor(world.tradeStats.value)}g traded</span></div><p class="small">Hotkeys: Space pause, 1–4 speeds, H hide UI, C watch mode, Esc deselect. WASD pans; wheel zooms.</p></div>`;c.querySelectorAll('[data-rate]').forEach(el=>el.oninput=e=>{let k=e.target.dataset.rate,v=+e.target.value;if(k==='tax')world.rates.tax=v/100;else world.rates[k]=v;updateControls()});c.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>act(b.dataset.act));document.getElementById('reforge').onclick=()=>{location.hash='s='+encodeURIComponent(document.getElementById('seedInp').value||Date.now());location.reload()};document.getElementById('copy').onclick=()=>navigator.clipboard&&navigator.clipboard.writeText(location.href);document.getElementById('export').onclick=exportChronicle;document.getElementById('watch').onclick=()=>document.body.classList.toggle('watch')}
function slider(name,key,min,max,val){return `<label>${name} <span>${Number(val).toFixed(2)}×</span></label><input data-rate="${key}" type="range" min="${min}" max="${max}" step=".05" value="${val}">`}

function exportChronicle(){let txt=`The Annals of ${world.title}\nSeed: ${world.seed}\n\n`+world.events.slice().reverse().map(e=>`${dateText(e.day)} — ${e.text}`).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));a.download=`annals-${world.seed}.txt`;a.click()}

function flyTo(pos,alt=500,dur=2600){camera.userData.fly={t0:performance.now(),dur,from:camera.position.clone(),to:new THREE.Vector3(pos.x,alt,pos.z+alt*.74),tfrom:camera.userData.target.clone(),tto:new THREE.Vector3(pos.x,hWorld(pos.x,pos.z)+18,pos.z)};director.suspend=clock.day+4}
function cameraControls(dt){let tgt=camera.userData.target,sp=dt*900;if(keys.KeyW)tgt.z-=sp;if(keys.KeyS)tgt.z+=sp;if(keys.KeyA)tgt.x-=sp;if(keys.KeyD)tgt.x+=sp;let alt=clamp(camera.position.y,8,4200),tilt=lerp(18,78,clamp((alt-80)/3000,0,1))*Math.PI/180;let desired=new THREE.Vector3(tgt.x,alt,tgt.z+alt/Math.tan(tilt));if(camera.userData.fly){let f=camera.userData.fly,t=clamp((performance.now()-f.t0)/f.dur,0,1),e=t*t*(3-2*t);desired.lerpVectors(f.from,f.to,e);tgt.lerpVectors(f.tfrom,f.tto,e);if(t>=1)camera.userData.fly=null}camera.position.lerp(desired,1-Math.exp(-dt*5));camera.lookAt(tgt.x,hWorld(tgt.x,tgt.z)+20,tgt.z)}
function directorUpdate(){let now=clock.day;if(director.queue.length&&now>director.suspend){director.queue.sort((a,b)=>b.priority-a.priority);let e=director.queue.shift();director.target=e;director.until=now+Math.max(8,20-e.priority);flyTo(e.pos,e.priority>8?420:720,2200);let b=document.getElementById('beat');b.style.display='block';b.querySelector('.beat-title').textContent=e.text;b.querySelector('.beat-sub').textContent=dateText(e.day)}if(now>director.until&&world.settlements.length&&now>director.suspend){let s=choice(hisR,world.settlements);flyTo(new THREE.Vector3(s.x,s.y,s.z),900,3500);director.until=now+18}}
function inspect(obj){let d=obj.data,html='';if(obj.kind==='settlement'){let house=world.houses[d.owner];let prices=goods.map(g=>`${g} ${d.prices[g].toFixed(1)}`).join(' · ');html=`<h3>${d.name}</h3><div class="small">${d.type} · ${house.name}</div><p>Population ${Math.floor(d.pop).toLocaleString()} · Prosperity ${Math.floor(d.prosperity)} · Unrest ${Math.floor(d.unrest)} · Walls ${Math.floor(d.walls)}</p><label>Prosperity</label><div class="bar"><span style="width:${d.prosperity}%"></span></div><label>Unrest</label><div class="bar"><span style="width:${d.unrest}%"></span></div><p class="small"><b>Stores:</b> grain ${Math.floor(d.stores.grain)}, fish ${Math.floor(d.stores.fish)}, timber ${Math.floor(d.stores.timber)}, tools ${Math.floor(d.stores.tools)}</p><p class="small"><b>Prices:</b> ${prices}</p>`}if(obj.kind==='building')html=`<h3>${d.archetype}</h3><div class="small">Tier ${d.tier+1} · ${d.state}</div><p>A ${d.archetype} in ${world.settlements[d.settlement].name}. ${d.emissive?'Its windows burn warmly at night.':'Its shutters are dark.'}</p>`;if(obj.kind==='caravan')html=`<h3>Caravan</h3><p>Route: ${world.settlements[d.origin].name} → ${world.settlements[d.dest].name}</p><p>Cargo ${d.cargo}, value ${Math.floor(d.value)}g.</p><p class="small">Trade is now mechanical: arrivals alter stores, prices, treasury, prosperity and plague risk.</p>`;if(obj.kind==='army')html=`<h3>Army</h3><p>${world.houses[d.house].name} · Strength ${d.strength} · Morale ${d.morale}</p>`;let el=document.getElementById('inspector');el.innerHTML=html;el.style.display='block'}
function pick(e){mouse.x=e.clientX/innerWidth*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;raycaster.setFromCamera(mouse,camera);let best=null,bd=75;for(const o of selectables){let p=o.pos instanceof THREE.Vector3?o.pos:new THREE.Vector3(o.data.x,o.data.y,o.data.z);let sp=p.clone().project(camera);if(sp.z>1)continue;let sx=(sp.x*.5+.5)*innerWidth,sy=(-sp.y*.5+.5)*innerHeight,dd=Math.hypot(sx-e.clientX,sy-e.clientY);if(dd<bd){bd=dd;best=o}}if(best){inspect(best);let p=best.pos instanceof THREE.Vector3?best.pos:new THREE.Vector3(best.data.x,best.data.y,best.data.z);flyTo(p,450,1600)}}
function labelsUpdate(){for(const l of labels){let p=new THREE.Vector3(l.s.x,l.s.y+80,l.s.z).project(camera);l.el.style.left=(p.x*.5+.5)*innerWidth+'px';l.el.style.top=(-p.y*.5+.5)*innerHeight+'px';l.el.style.display=(p.z<1&&camera.position.y>120)?'block':'none'}}
function animate(t){requestAnimationFrame(animate);let dt=Math.min(.05,(t-(animate.last||t))/1000);animate.last=t;clock.acc+=dt*clock.speed;while(clock.acc>=1){tick();clock.acc-=1}updateAgents();updateProps(t);cameraControls(dt);directorUpdate();labelsUpdate();updateSeasonLook();updateHUD();renderer.render(scene,camera)}
function boot(){let seed=(location.hash.match(/s=([^&]+)/)||[])[1]||String(Math.floor(Math.random()*1e9));location.hash='s='+encodeURIComponent(seed);makeWorld(seed);setupScene();raycaster=new THREE.Raycaster();mouse=new THREE.Vector2();chronicle('crown',9,world.settlements[0],`Here begin the years of ${monarch().name}, ruler of ${world.title}.`);chronicle('trade',5,world.settlements[0],`The king's roads were measured, and the first caravans set their bells ringing.`);addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space')clock.speed=clock.speed?0:2;if(['Digit1','Digit2','Digit3','Digit4'].includes(e.code))clock.speed=[.5,2,8,30][+e.code.slice(-1)-1];if(e.code==='KeyH')document.body.classList.toggle('clean');if(e.code==='KeyC')document.body.classList.toggle('watch');if(e.code==='Escape')document.getElementById('inspector').style.display='none'});addEventListener('keyup',e=>keys[e.code]=false);renderer.domElement.addEventListener('click',pick);renderer.domElement.addEventListener('wheel',e=>{camera.position.y=clamp(camera.position.y*(1+Math.sign(e.deltaY)*.12),8,4200);director.suspend=clock.day+30},{passive:true});let dragging=false,last={x:0,y:0};renderer.domElement.addEventListener('pointerdown',e=>{dragging=true;last={x:e.clientX,y:e.clientY};director.suspend=clock.day+30});addEventListener('pointerup',()=>dragging=false);addEventListener('pointermove',e=>{if(!dragging)return;let dx=e.clientX-last.x,dy=e.clientY-last.y;last={x:e.clientX,y:e.clientY};let tgt=camera.userData.target;tgt.x-=dx*camera.position.y/900;tgt.z-=dy*camera.position.y/900});document.querySelectorAll('#timeBtns button').forEach(b=>b.onclick=()=>clock.speed=+b.dataset.spd);document.querySelectorAll('.filters button').forEach(b=>b.onclick=()=>{world.filter=b.dataset.filter;document.querySelectorAll('.filters button').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderChronicle()});document.getElementById('forge').style.opacity=0;setTimeout(()=>document.getElementById('forge').classList.add('hidden'),500);animate(performance.now())}
boot();
</script>
