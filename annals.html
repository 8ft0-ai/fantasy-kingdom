function terrainMesh(){let g=new THREE.PlaneBufferGeometry(W,W,46,46);g.rotateX(-Math.PI/2);let p=g.attributes.position,cols=[];for(let i=0;i<p.count;i++){let x=p.getX(i),z=p.getZ(i),h=hWorld(x,z),b=biome(x,z),c=new THREE.Color(b==='water'?0x315f7a:b==='stone'?0x8e8780:b==='forest'?0x355b3c:b==='farmland'?0xa4b35d:b==='dry steppe'?0x9ca260:0x73a85b);p.setY(i,h);c.multiplyScalar(.8+h/3600);cols.push(c.r,c.g,c.b)}g.setAttribute('color',new THREE.Float32BufferAttribute(cols,3));g.computeVertexNormals();scene.add(new THREE.Mesh(g,new THREE.MeshLambertMaterial({vertexColors:true})))}
function waterMesh(){let m=new THREE.LineBasicMaterial({color:0x4e91b0});for(const p of world.riverPaths)scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(p.map(q=>new THREE.Vector3(q.x,hWorld(q.x,q.z)+4,q.z))),m));for(const l of world.hydrology.lakes){let o=new THREE.Mesh(new THREE.CircleBufferGeometry(l.r,24),new THREE.MeshLambertMaterial({color:0x477fa0,transparent:true,opacity:.45}));o.rotation.x=-Math.PI/2;o.position.set(l.x,2,l.z);scene.add(o)}}
function roadMeshes(){let m=new THREE.LineBasicMaterial({color:0x755a38});for(const r of world.roads){scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(r.pts.map(p=>new THREE.Vector3(p.x,p.y+2,p.z))),m));for(const b of r.bridges){let o=new THREE.Mesh(new THREE.BoxBufferGeometry(90,10,28),new THREE.MeshLambertMaterial({color:0x6a5a3d}));o.position.set(b.x,b.y,b.z);scene.add(o)}}}
function settlementMeshes(){for(const s of world.settlements){let group=new THREE.Group,rad=s.type==='capital'?76:s.type==='town'?52:34,base=new THREE.Mesh(new THREE.CylinderBufferGeometry(rad,rad,22,16),new THREE.MeshLambertMaterial({color:s.site.harbour?0xd8c48c:0xbfa785})),keep=new THREE.Mesh(new THREE.ConeBufferGeometry(.5*rad,90,6),new THREE.MeshLambertMaterial({color:world.houses[s.owner].colour}));base.position.y=12;keep.position.y=68;group.add(base,keep);group.position.set(s.x,s.y+4,s.z);scene.add(group);selectables.push({data:s,pos:group.position})}}
function labelsRefresh(){if(!labels.length)for(const s of world.settlements){let el=document.createElement('div');el.className='label';document.body.appendChild(el);labels.push({el,s})}for(const l of labels)l.el.innerHTML=l.s.name+(l.s.site.harbour?' ⚓':'')}
function drawLabels(){for(const l of labels){let v=new THREE.Vector3(l.s.x,l.s.y+125,l.s.z).project(camera);l.el.style.left=(v.x*.5+.5)*innerWidth+'px';l.el.style.top=(-v.y*.5+.5)*innerHeight+'px';l.el.style.display=v.z<1&&camera.position.y>120?'block':'none'}}
function renderChronicle(){let rows=world.events.filter(e=>world.filter==='all'||e.class===world.filter).slice(0,120);entries.innerHTML=rows.map((e,i)=>`<div class="entry ${e.class}" data-i="${i}"><div class="date">${dt(e.day)}</div><p class="txt">${e.text}</p></div>`).join('');[...entries.children].forEach((el,i)=>el.onclick=()=>fly(rows[i].pos,520,1800))}
function drawer(){let counts=world.resources.reduce((a,r)=>(a[r.type]=(a[r.type]||0)+1,a),{}),bridges=world.roads.reduce((a,r)=>a+r.bridges.length,0);drawer.innerHTML=`<b>ANNALS v0.7</b><p class="small">Seeded terrain spine, ${terrainSpec.coast.active?'coastline':'inland realm'}, bounded rivers, scored settlements, resources and cost-routed roads.</p><p class="small">Rivers <b>${world.riverPaths.length}</b> · Lakes <b>${world.hydrology.lakes.length}</b> · Resources <b>${world.resources.length}</b> · Bridges <b>${bridges}</b></p><p class="small">farmland ${counts.farmland||0}, forest ${counts.forest||0}, ore ${counts.ore||0}, fishing ${counts.fishing||0}, harbour ${counts.harbour||0}</p><div class="section"><b>Pressure</b>${world.settlements.map(s=>`<p class="small"><b>${s.name}</b> ${s.type} · ${s.site.waterAccess} · ${s.site.resources.join(', ')||'local fields'}<br>H ${Math.floor(s.hunger)} U ${Math.floor(s.unrest)} P ${Math.floor(s.prosperity)}<span class="bar"><span style="width:${s.hunger}%"></span></span></p>`).join('')}</div><div class="section grid"><button onclick="act('drought')">Drought</button><button onclick="act('fire')">Fire</button><button onclick="act('festival')">Festival</button><button onclick="act('grain')">Grain</button></div><div class="section"><button onclick="location.hash='s='+Date.now();location.reload()">Reforge</button> <button onclick="navigator.clipboard&&navigator.clipboard.writeText(location.href)">Copy link</button> <button onclick="exportChronicle()">Export</button> <button onclick="document.body.classList.toggle('watch')">Watch</button><p class="small">Seed ${world.seed}. Hotkeys: Space, 1–4, H, C.</p></div>`}
function hud(){let p=pressure();meta.innerHTML=`<span class="chip">${dt(clock.day)}</span><span class="chip">${world.season} · ${world.weather}${world.drought?' · Drought':''}</span><span class="chip">${terrainSpec.coast.active?'Coastal':'Inland'}</span><span class="chip">Pressure ${p.name} H${Math.floor(p.hunger)} U${Math.floor(p.unrest)}</span>`;document.querySelectorAll('#speed button').forEach(b=>b.classList.toggle('active',+b.dataset.speed===clock.speed))}
function exportChronicle(){let txt=`The Annals of ${world.title}\nSeed: ${world.seed}\n\n`+world.events.slice().reverse().map(e=>`${dt(e.day)} — ${e.text}`).join('\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));a.download=`annals-${world.seed}.txt`;a.click()}
function fly(pos,alt=600,dur=2200){camera.userData.fly={t0:performance.now(),dur,from:camera.position.clone(),to:new THREE.Vector3(pos.x,alt,pos.z+.75*alt),tf:camera.userData.target.clone(),tt:new THREE.Vector3(pos.x,hWorld(pos.x,pos.z)+20,pos.z)};director.suspend=clock.day+4}
function move(dt){let t=camera.userData.target,sp=900*dt;if(keys.KeyW)t.z-=sp;if(keys.KeyS)t.z+=sp;if(keys.KeyA)t.x-=sp;if(keys.KeyD)t.x+=sp;let alt=clamp(camera.position.y,60,4200),to=new THREE.Vector3(t.x,alt,t.z+alt/Math.tan(.55));if(camera.userData.fly){let f=camera.userData.fly,u=clamp((performance.now()-f.t0)/f.dur,0,1),e=u*u*(3-2*u);to.lerpVectors(f.from,f.to,e);t.lerpVectors(f.tf,f.tt,e);if(u>=1)camera.userData.fly=null}camera.position.lerp(to,1-Math.exp(-5*dt));camera.lookAt(t.x,hWorld(t.x,t.z)+20,t.z)}
function directorTick(){if(director.queue.length&&clock.day>director.suspend){director.queue.sort((a,b)=>b.priority-a.priority);let e=director.queue.shift();director.until=clock.day+Math.max(8,22-e.priority);fly(e.pos,e.priority>8?420:720,2200)}if(clock.day>director.until&&clock.day>director.suspend){fly(pick(hisR,world.settlements),900,3500);director.until=clock.day+18}}
function loop(t){requestAnimationFrame(loop);let dtm=Math.min(.05,(t-(loop.last||t))/1000);loop.last=t;clock.acc+=dtm*clock.speed;while(clock.acc>=1){tick();clock.acc--}move(dtm);directorTick();drawLabels();hud();renderer.render(scene,camera)}
function runHeadless(seed,days,opt={}){clock={day:1,speed:8,acc:0};director={queue:[],until:0,suspend:0};world=makeWorld(seed);if(opt.initialChronicle)firstEntries();for(let i=0;i<days;i++)tick();return{seed,version:world.version,coastal:world.terrainSpec.coast.active,riverPaths:world.riverPaths.length,lakes:world.hydrology.lakes.length,resources:world.resources.reduce((a,r)=>(a[r.type]=(a[r.type]||0)+1,a),{}),events:world.events.map(e=>e.text),settlements:world.settlements.map(s=>({name:s.name,type:s.type,x:Math.round(s.x),z:Math.round(s.z),site:s.site,hunger:s.hunger,unrest:s.unrest})),roads:world.roads.map(r=>({a:r.a,b:r.b,points:r.pts.length,bridges:r.bridges.length,directness:directness(r)}))}}
function boot(){try{let seed=(location.hash.match(/s=([^&]+)/)||[])[1]||String(Math.floor(Math.random()*1e9));location.hash='s='+encodeURIComponent(seed);world=makeWorld(seed);document.title='The Annals of '+world.title;title.textContent='The Annals of '+world.title;setupScene();firstEntries();addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});addEventListener('keydown',e=>{keys[e.code]=1;if(e.code==='Space')clock.speed=clock.speed?0:8;if(['Digit1','Digit2','Digit3','Digit4'].includes(e.code))clock.speed=[.5,2,8,30][+e.code.slice(-1)-1];if(e.code==='KeyH')document.body.classList.toggle('clean');if(e.code==='KeyC')document.body.classList.toggle('watch')});addEventListener('keyup',e=>keys[e.code]=0);renderer.domElement.addEventListener('wheel',e=>{camera.position.y=clamp(camera.position.y*(1+.12*Math.sign(e.deltaY)),60,4200);director.suspend=clock.day+30},{passive:true});document.querySelectorAll('#speed button').forEach(b=>b.onclick=()=>clock.speed=+b.dataset.speed);document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{world.filter=b.dataset.filter;document.querySelectorAll('[data-filter]').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderChronicle()});forge.style.display='none';loop(performance.now())}catch(e){console.error(e);forge.textContent='The realm failed to form: '+e.message}}
if(typeof window!=='undefined'){window.ANNALS_DEBUG={makeWorld,runHeadless,hWorld,biomeAt:biome};addEventListener('load',boot)}
</script></body></html>
