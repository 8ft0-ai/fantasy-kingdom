function drawer(){let counts=world.resources.reduce((a,r)=>(a[r.type]=(a[r.type]||0)+1,a),{}),bridges=world.roads.reduce((a,r)=>a+r.bridges.length,0),types=[...new Set(world.buildings.map(b=>b.type))];drawer.innerHTML=`<b>ANNALS ${world.version}</b><p class="small">Seeded terrain, cost-routed roads, settlement streets, persistent lots, districts and procedural building archetypes.</p><p class="small">Rivers <b>${world.riverPaths.length}</b> · Lakes <b>${world.hydrology.lakes.length}</b> · Resources <b>${world.resources.length}</b> · Bridges <b>${bridges}</b></p><p class="small">Buildings <b>${world.buildings.length}</b> · Archetypes <b>${types.length}</b>: ${types.slice(0,10).join(', ')}</p><p class="small">farmland ${counts.farmland||0}, forest ${counts.forest||0}, ore ${counts.ore||0}, fishing ${counts.fishing||0}, harbour ${counts.harbour||0}</p><div class="section"><b>Pressure and layout</b>${world.settlements.map(s=>`<p class="small"><b>${s.name}</b> ${s.type} · ${s.layout.lots.length} lots · ${s.layout.districts.join(', ')}<br>H ${Math.floor(s.hunger)} U ${Math.floor(s.unrest)} P ${Math.floor(s.prosperity)}<span class="bar"><span style="width:${s.hunger}%"></span></span></p>`).join('')}</div><div class="section grid"><button onclick="act('drought')">Drought</button><button onclick="act('fire')">Fire</button><button onclick="act('festival')">Festival</button><button onclick="act('grain')">Grain</button></div><div class="section"><button onclick="location.hash='s='+Date.now();location.reload()">Reforge</button> <button onclick="navigator.clipboard&&navigator.clipboard.writeText(location.href)">Copy link</button> <button onclick="exportChronicle()">Export</button> <button onclick="document.body.classList.toggle('watch')">Watch</button><p class="small">Seed ${world.seed}. Hotkeys: Space, 1–4, H, C. Click buildings near settlements for lot and goods details.</p></div>`}
function hud(){let p=pressure();meta.innerHTML=`<span class="chip">${dt(clock.day)}</span><span class="chip">${world.season} · ${world.weather}${world.drought?' · Drought':''}</span><span class="chip">${terrainSpec.coast.active?'Coastal':'Inland'}</span><span class="chip">Buildings ${world.buildings.length}</span><span class="chip">Pressure ${p.name} H${Math.floor(p.hunger)} U${Math.floor(p.unrest)}</span>`;document.querySelectorAll('#speed button').forEach(b=>b.classList.toggle('active',+b.dataset.speed===clock.speed))}
function exportChronicle(){let ordered=world.events.slice().reverse(),lastYear=0,lines=[`THE ANNALS OF ${world.title.toUpperCase()}`,`Seed ${world.seed}`,'A deterministic history of the realm','========================================',''];for(const e of ordered){let year=Math.floor((e.day-1)/360)+1;if(year!==lastYear){lines.push('',`YEAR ${year}`,'------');lastYear=year}if(e.header)lines.push('',e.text.toUpperCase(),'');else lines.push(`${dt(e.day)} [${String(e.kind||e.class).toUpperCase()}]${e.location?` — ${e.location}`:''}`,e.text,'')}lines.push(`Thus ends the surviving record of ${world.title}.`);let url=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'})),a=document.createElement('a');a.href=url;a.download=`annals-${world.seed}.txt`;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000)}
function showInspector(data){if(!data||typeof document==='undefined')return;let el=document.getElementById('inspect');el.style.display='block';if(data.kind==='settlement'){let s=data.settlement;el.innerHTML=`<button style="float:right" onclick="document.getElementById('inspect').style.display='none'">×</button><h3 class="inspector-title">${safeName(s.name)}</h3><div class="kv"><b>Type</b><span>${s.type}</span><b>Lots</b><span>${s.layout.lots.length}</span><b>Districts</b><span>${s.layout.districts.map(d=>`<span class='district-chip'>${d}</span>`).join('')}</span><b>Stores</b><span>${Math.round(s.stores.grain)} grain, ${Math.round(s.stores.fish)} fish</span><b>State</b><span>Hunger ${Math.floor(s.hunger)}, unrest ${Math.floor(s.unrest)}</span></div>`;return}let b=data.building,lot=data.lot,s=world.settlements[b.settlementId],goods=Object.keys(b.stored||{}).map(k=>`${b.stored[k]} ${k}`).join(', ')||'household goods';el.innerHTML=`<button style="float:right" onclick="document.getElementById('inspect').style.display='none'">×</button><h3 class="inspector-title">${safeName(b.type)} on lot ${safeName(b.lotId)}</h3><div class="kv"><b>Settlement</b><span>${safeName(s.name)}</span><b>District</b><span>${safeName(b.district)}</span><b>Type</b><span>${safeName(b.type)}</span><b>Tier</b><span>${safeName(b.tier)}</span><b>State</b><span>${safeName(b.state)}</span><b>Households</b><span>${b.households||0}</span><b>Stored goods</b><span>${safeName(goods)}</span><b>Lot identity</b><span>${safeName(lot.id)} persists through ruins and rebuilds</span></div>`}
function handlePick(e){let rect=renderer.domElement.getBoundingClientRect(),mouse=new THREE.Vector2((e.clientX-rect.left)/rect.width*2-1,-((e.clientY-rect.top)/rect.height*2-1)),ray=new THREE.Raycaster();ray.setFromCamera(mouse,camera);let hit=ray.intersectObjects(pickables,true)[0];if(hit){let o=hit.object;while(o&&!o.userData.pick)o=o.parent;showInspector(o&&o.userData.pick);director.suspend=clock.day+20}}function fly(pos,alt=600,dur=2200){camera.userData.fly={t0:performance.now(),dur,from:camera.position.clone(),to:new THREE.Vector3(pos.x,alt,pos.z+.75*alt),tf:camera.userData.target.clone(),tt:new THREE.Vector3(pos.x,hWorld(pos.x,pos.z)+20,pos.z)};director.suspend=clock.day+4}
function move(dt){let t=camera.userData.target,sp=900*dt;if(keys.KeyW)t.z-=sp;if(keys.KeyS)t.z+=sp;if(keys.KeyA)t.x-=sp;if(keys.KeyD)t.x+=sp;let alt=clamp(camera.position.y,60,4200),to=new THREE.Vector3(t.x,alt,t.z+alt/Math.tan(.55));if(camera.userData.fly){let f=camera.userData.fly,u=clamp((performance.now()-f.t0)/f.dur,0,1),e=u*u*(3-2*u);to.lerpVectors(f.from,f.to,e);t.lerpVectors(f.tf,f.tt,e);if(u>=1)camera.userData.fly=null}camera.position.lerp(to,1-Math.exp(-5*dt));camera.lookAt(t.x,hWorld(t.x,t.z)+20,t.z);if(settlementDetailGroup)settlementDetailGroup.visible=camera.position.y<2500}
function directorTick(){if(director.queue.length&&clock.day>director.suspend){director.queue.sort((a,b)=>b.priority-a.priority);let e=director.queue.shift();director.until=clock.day+Math.max(8,22-e.priority);fly(e.pos,e.priority>8?420:720,2200)}if(clock.day>director.until&&clock.day>director.suspend){fly(pick(hisR,world.settlements),900,3500);director.until=clock.day+18}}
function loop(t){requestAnimationFrame(loop);let dtm=Math.min(.05,(t-(loop.last||t))/1000);loop.last=t;clock.acc+=dtm*clock.speed;while(clock.acc>=1){tick();clock.acc--}move(dtm);directorTick();drawLabels();hud();renderer.render(scene,camera)}
function runHeadless(seed,days,opt={}){clock={day:1,speed:8,acc:0};director={queue:[],until:0,suspend:0};world=makeWorld(seed);if(opt.initialChronicle)firstEntries();for(let i=0;i<days;i++){if(opt.fireAt===i)act('fire');tick()}return{seed,version:world.version,coastal:world.terrainSpec.coast.active,riverPaths:world.riverPaths.length,lakes:world.hydrology.lakes.length,resources:world.resources.reduce((a,r)=>(a[r.type]=(a[r.type]||0)+1,a),{}),events:world.events.map(e=>e.text),settlements:world.settlements.map(s=>({name:s.name,type:s.type,x:Math.round(s.x),z:Math.round(s.z),lots:s.layout.lots.length,districts:s.layout.districts,site:s.site,hunger:s.hunger,unrest:s.unrest})),buildingCount:world.buildings.length,buildingTypes:[...new Set(world.buildings.map(b=>b.type))],buildingStates:world.buildings.reduce((a,b)=>(a[b.state]=(a[b.state]||0)+1,a),{}),roads:world.roads.map(r=>({a:r.a,b:r.b,points:r.pts.length,bridges:r.bridges.length,directness:directness(r)}))}}
function boot(){try{let seed=(location.hash.match(/s=([^&]+)/)||[])[1]||String(Math.floor(Math.random()*1e9));location.hash='s='+encodeURIComponent(seed);world=makeWorld(seed);document.title='The Annals of '+world.title;title.textContent='The Annals of '+world.title;setupScene();firstEntries();addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});addEventListener('keydown',e=>{keys[e.code]=1;if(e.code==='Space')clock.speed=clock.speed?0:8;if(['Digit1','Digit2','Digit3','Digit4'].includes(e.code))clock.speed=[.5,2,8,30][+e.code.slice(-1)-1];if(e.code==='KeyH')document.body.classList.toggle('clean');if(e.code==='KeyC')document.body.classList.toggle('watch');if(e.code==='Escape')document.getElementById('inspect').style.display='none'});addEventListener('keyup',e=>keys[e.code]=0);renderer.domElement.addEventListener('wheel',e=>{camera.position.y=clamp(camera.position.y*(1+.12*Math.sign(e.deltaY)),60,4200);director.suspend=clock.day+30},{passive:true});renderer.domElement.addEventListener('click',handlePick);document.querySelectorAll('#speed button').forEach(b=>b.onclick=()=>clock.speed=+b.dataset.speed);document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{world.filter=b.dataset.filter;document.querySelectorAll('[data-filter]').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderChronicle()});forge.style.display='none';loop(performance.now())}catch(e){console.error(e);forge.textContent='The realm failed to form: '+e.message}}
if(typeof window!=='undefined'){window.ANNALS_DEBUG={makeWorld,runHeadless,hWorld,biomeAt:biome};addEventListener('load',boot)}
</script>
